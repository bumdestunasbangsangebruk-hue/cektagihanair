<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tirto Langgeng</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
/* ✅ STYLE ASLI DIPERTAHANKAN */
:root{
--primary:#0060B1;
--green:#27ae60;
--red:#e74c3c;
--orange:#e67e22;
}
body{font-family:Arial;background:#f4f7f6;margin:0;padding:10px;}
.header{background:linear-gradient(135deg,#0060B1,#0099ff);color:white;padding:20px;text-align:center;border-radius:12px;}
.logo{width:80px;height:80px;background:white;padding:8px;border-radius:50%;}
.card{background:white;padding:15px;border-radius:12px;margin-top:15px;}
input,select,button{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #ccc;}
button{border:none;font-weight:bold;cursor:pointer;}
.btn{background:var(--primary);color:white;}
.green{background:var(--green);color:white;}
.red{background:var(--red);color:white;}
.orange{background:var(--orange);color:white;}
.hidden{display:none;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:8px;border-bottom:1px solid #ddd;}
.status-lunas{color:green;font-weight:bold;}
.status-belum{color:red;font-weight:bold;}
.wrap{overflow-x:auto;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login Sistem</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>

<!-- HEADER -->
<div class="header">
<h2>TIRTO LANGGENG</h2>
<p>BUMDes</p>
</div>

<!-- ADMIN -->
<div class="card hidden" id="adminPanel">
<h3>Admin</h3>
<input type="file" id="csvFile">
<button class="btn" onclick="uploadCSV()">Upload CSV</button>
<button class="red" onclick="hapusSemua()">Hapus Semua</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- KOLEKTOR -->
<div class="card hidden" id="kolektorPanel">
<h3>Kolektor</h3>
<button class="green" onclick="simpan()">💾 Simpan</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- TABLE -->
<div class="card wrap">
<table>
<thead id="thead"></thead>
<tbody id="bodyTabel"></tbody>
</table>
</div>

<script>
const SUPABASE_URL="https://YOUR_URL.supabase.co";
const SUPABASE_KEY="YOUR_KEY";
const db = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let role="";
let globalData=[];

// LOGIN
function login(){
let u=username.value;
let p=password.value;

if(u==="Admin" && p==="Tun@s123"){
role="admin";
}
else if(u==="kolektor" && p==="bpsab123"){
role="kolektor";
}
else{
alert("Salah");return;
}

loginBox.style.display="none";
if(role==="admin") adminPanel.style.display="block";
if(role==="kolektor") kolektorPanel.style.display="block";

loadData();
}

function logout(){location.reload();}

// LOAD
async function loadData(){
let {data}=await db.from("tirto_data").select("*");
globalData=data||[];
render();
}

// UPLOAD CSV (REPLACE)
async function uploadCSV(){
let file=csvFile.files[0];
if(!file)return;

Papa.parse(file,{
header:true,
complete: async function(res){

await db.from("tirto_data").delete().neq("id",0);

let rows=res.data.map(x=>({
no:x.No,
konsumen:x.Konsumen,
alamat:x.Alamat,
blok:x.Blok,
tipe:Number(x.Tipe||1000),
kolektor:x.Kolektor,
meter_awal:Number(x["Meter Awal"]||0),
meter_akhir:Number(x["Meter Akhir"]||0),
bayar:Number(x.Bayar||0),
status:x.Status||"Belum"
}));

await db.from("tirto_data").insert(rows);

loadData();
alert("Upload berhasil");
}
});
}

// HITUNG
function hitung(r){
let pakai=r.meter_akhir-r.meter_awal;
if(pakai<0) pakai=0;
let tagihan=pakai*r.tipe;
let sisa=tagihan-r.bayar;
return {pakai,tagihan,sisa};
}

// RENDER (BEDA ROLE)
function render(){

let head="";
let html="";

if(role===""){
head=`<tr>
<th>No</th><th>Konsumen</th><th>Alamat</th>
<th>Blok</th><th>Tipe</th><th>Kolektor</th>
<th>Pemakaian</th><th>Tagihan</th><th>Status</th>
</tr>`;
}else{
head=`<tr>
<th>No</th><th>Konsumen</th><th>Alamat</th>
<th>Blok</th><th>Tipe</th><th>Kolektor</th>
<th>Meter Awal</th><th>Meter Akhir</th>
<th>Pemakaian</th><th>Tagihan</th>
<th>Status</th><th>Bayar</th><th>Sisa</th>
</tr>`;
}

thead.innerHTML=head;

globalData.forEach((r,i)=>{
let h=hitung(r);

if(role===""){
html+=`
<tr>
<td>${r.no}</td>
<td>${r.konsumen}</td>
<td>${r.alamat}</td>
<td>${r.blok}</td>
<td>${r.tipe}</td>
<td>${r.kolektor}</td>
<td>${h.pakai}</td>
<td>${h.tagihan}</td>
<td class="${h.sisa<=0?'status-lunas':'status-belum'}">
${h.sisa<=0?'Lunas':'Belum'}
</td>
</tr>`;
}else{

html+=`
<tr>
<td>${r.no}</td>
<td contenteditable oninput="edit(${i},'konsumen',this.innerText)">${r.konsumen}</td>
<td contenteditable oninput="edit(${i},'alamat',this.innerText)">${r.alamat}</td>
<td contenteditable oninput="edit(${i},'blok',this.innerText)">${r.blok}</td>
<td contenteditable oninput="edit(${i},'tipe',this.innerText)">${r.tipe}</td>
<td>${r.kolektor}</td>
<td contenteditable oninput="edit(${i},'meter_awal',this.innerText)">${r.meter_awal}</td>
<td contenteditable oninput="edit(${i},'meter_akhir',this.innerText)">${r.meter_akhir}</td>
<td>${h.pakai}</td>
<td>${h.tagihan}</td>
<td contenteditable oninput="edit(${i},'status',this.innerText)">${r.status}</td>
<td contenteditable oninput="edit(${i},'bayar',this.innerText)">${r.bayar}</td>
<td>${h.sisa}</td>
</tr>`;
}

});

bodyTabel.innerHTML=html;
}

// EDIT
function edit(i,f,v){
globalData[i][f]=v;
}

// SIMPAN
async function simpan(){
for(let r of globalData){
await db.from("tirto_data").update(r).eq("id",r.id);
}
alert("Tersimpan");
loadData();
}

// HAPUS
async function hapusSemua(){
await db.from("tirto_data").delete().neq("id",0);
loadData();
}

// AUTO LOAD
loadData();
</script>

</body>
</html>
