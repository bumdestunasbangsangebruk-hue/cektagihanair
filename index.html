<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tirto Langgeng</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
:root{
--primary:#0060B1;
--green:#27ae60;
--red:#e74c3c;
--orange:#e67e22;
}

body{
font-family:Arial,sans-serif;
background:#f4f7f6;
margin:0;
padding:10px;
}

.header{
background:var(--primary);
color:white;
padding:20px;
text-align:center;
border-radius:12px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

input,select,button{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-top:5px;
width:100%;
box-sizing:border-box;
}

button{
border:none;
font-weight:bold;
cursor:pointer;
}

.btn{background:var(--primary);color:white;}
.green{background:var(--green);color:white;}
.red{background:var(--red);color:white;}
.orange{background:var(--orange);color:white;}

.hidden{display:none;}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
min-width:1400px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#f8f9fa;
}

.status-lunas{color:green;font-weight:bold;}
.status-belum{color:red;font-weight:bold;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login Sistem</h3>

<input type="text" id="username" placeholder="Masukkan Username">
<input type="password" id="password" placeholder="Masukkan Password">

<button class="btn" onclick="login()">Login</button>
</div>

<!-- HEADER -->
<div class="header">

    <!-- LOGO -->
    <img src="image_916921.png" class="logo">

    <h2 style="margin:8px 0 0 0;">TIRTO LANGGENG</h2>
    <p style="margin:5px 0 0 0;">BUMDes Tunas Bangsa Ngebruk</p>

</div>

<!-- ADMIN -->
<div class="card hidden" id="adminPanel">
<h3>🔓 Mode Admin</h3>

<input type="file" id="csvFile" accept=".csv">
<button class="btn" onclick="uploadCSV()">Upload CSV</button>
<button class="orange" onclick="downloadCSV()">Download CSV</button>
<button class="red" onclick="hapusCSV()">Delete CSV</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- KOLEKTOR -->
<div class="card hidden" id="kolektorPanel">
<h3>💰 Mode Kolektor</h3>

<select id="filterArea" onchange="filterArea()">
<option value="">-- Pilih Area / Blok --</option>
</select>

<button class="green" onclick="simpanPerubahan()">💾 Simpan Perubahan</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- SEARCH -->
<div class="card">
<input type="text" id="cari" placeholder="Cari pelanggan..." onkeyup="filterTabel()">
</div>

<!-- TABLE -->
<div class="card" style="overflow-x:auto;">
<table>
<thead>
<tr>
<th>No</th>
<th>Konsumen</th>
<th>Alamat</th>
<th>Blok</th>
<th>Meter Lama</th>
<th>Meter Sekarang</th>
<th>Pemakaian</th>
<th>Tagihan</th>
<th>Status</th>
<th>Bayar</th>
<th>Sisa</th>
</tr>
</thead>

<tbody id="bodyTabel">
<tr>
<td colspan="11" style="text-align:center;padding:20px;">
Belum ada data
</td>
</tr>
</tbody>
</table>
</div>

<script>
let role = "";
let globalData = [];
let filteredData = [];

// ================= LOGIN =================
function login(){

let u = document.getElementById("username").value.trim();
let p = document.getElementById("password").value.trim();

if(u==="Admin" && p==="Tun@s123"){
role="admin";
localStorage.setItem("role","admin");
masuk();
}
else if(u==="kolektor" && p==="bpsab123"){
role="kolektor";
localStorage.setItem("role","kolektor");
masuk();
}
else{
alert("Username / Password salah!");
}
}

function masuk(){

document.getElementById("loginBox").style.display="none";

if(role==="admin"){
document.getElementById("adminPanel").style.display="block";
}

if(role==="kolektor"){
document.getElementById("kolektorPanel").style.display="block";
}

loadData();
}

function logout(){
localStorage.removeItem("role");
location.reload();
}

// ================= AUTO LOGIN =================
window.onload=function(){

let r = localStorage.getItem("role");

if(r){
role=r;
masuk();
}else{
loadData();
}
}

// ================= CSV =================
function uploadCSV(){

let file = document.getElementById("csvFile").files[0];

if(!file){
alert("Pilih file CSV");
return;
}

Papa.parse(file,{
header:true,
skipEmptyLines:true,

complete:function(res){

globalData = res.data;
filteredData = globalData;

localStorage.setItem(
"tirtoData",
JSON.stringify(globalData)
);

isiFilterArea();
render(filteredData);

alert("Upload berhasil");
}
});
}

function loadData(){

let data = localStorage.getItem("tirtoData");

if(data){
globalData = JSON.parse(data);
filteredData = globalData;
isiFilterArea();
render(filteredData);
}
}

function downloadCSV(){

if(globalData.length===0){
alert("Data kosong");
return;
}

let csv = Papa.unparse(globalData);

let blob = new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "Tagihan.csv";
link.click();
}

function hapusCSV(){

if(confirm("Hapus semua data?")){

globalData=[];
filteredData=[];
localStorage.removeItem("tirtoData");
render([]);
}
}

// ================= FILTER AREA =================
function isiFilterArea(){

let select = document.getElementById("filterArea");
if(!select) return;

let bloks = [...new Set(globalData.map(x=>x["Blok"] || ""))];

select.innerHTML =
'<option value="">-- Pilih Area / Blok --</option>';

bloks.forEach(b=>{
if(b!=""){
select.innerHTML +=
`<option value="${b}">${b}</option>`;
}
});
}

function filterArea(){

let area =
document.getElementById("filterArea").value;

if(area===""){
filteredData = globalData;
}else{
filteredData =
globalData.filter(x=>x["Blok"]===area);
}

render(filteredData);
}

// ================= RENDER =================
function render(data){

let body = document.getElementById("bodyTabel");

if(data.length===0){
body.innerHTML=`
<tr>
<td colspan="11" style="text-align:center">
Belum ada data
</td>
</tr>`;
return;
}

body.innerHTML="";

data.forEach((row,i)=>{

let lama = Number(row["Awal  Meter"] || 0);
let sekarang = Number(row["Meter Sekarang"] || lama);
let pakai = sekarang - lama;

if(pakai < 0) pakai = 0;

let tagihan = Number(row["Tagihan"] || 0);
let bayar = Number(row["Bayar"] || 0);
let sisa = tagihan - bayar;

let status =
sisa<=0 ? "Sudah Bayar" : "Belum Bayar";

if(role==="kolektor"){

body.innerHTML += `
<tr>
<td>${row["No"] || i+1}</td>
<td>${row["Konsumen"] || ""}</td>

<td>
<input value="${row["Alamat"] || ""}"
onchange="ubah('${row["No"]}','Alamat',this.value)">
</td>

<td>${row["Blok"] || ""}</td>

<td>${lama}</td>

<td>
<input type="number"
value="${sekarang}"
onchange="ubah('${row["No"]}','Meter Sekarang',this.value)">
</td>

<td>${pakai}</td>

<td>${tagihan}</td>

<td class="${status==='Sudah Bayar'?'status-lunas':'status-belum'}">
${status}
</td>

<td>
<input type="number"
value="${bayar}"
onchange="ubah('${row["No"]}','Bayar',this.value)">
</td>

<td>${sisa}</td>
</tr>
`;

}else{

body.innerHTML += `
<tr>
<td>${row["No"] || i+1}</td>
<td>${row["Konsumen"] || ""}</td>
<td>${row["Alamat"] || ""}</td>
<td>${row["Blok"] || ""}</td>
<td>${lama}</td>
<td>${sekarang}</td>
<td>${pakai}</td>
<td>${tagihan}</td>
<td class="${status==='Sudah Bayar'?'status-lunas':'status-belum'}">
${status}
</td>
<td>${bayar}</td>
<td>${sisa}</td>
</tr>
`;
}

});
}

// ================= EDIT =================
function ubah(no,kolom,nilai){

let index =
globalData.findIndex(x=>x["No"]==no);

if(index!==-1){
globalData[index][kolom]=nilai;
}

render(filteredData);
}

// ================= SIMPAN =================
function simpanPerubahan(){

localStorage.setItem(
"tirtoData",
JSON.stringify(globalData)
);

alert("Perubahan berhasil disimpan");
}

// ================= SEARCH =================
function filterTabel(){

let key =
document.getElementById("cari")
.value.toLowerCase();

let hasil =
globalData.filter(x=>

(x["Konsumen"] || "")
.toLowerCase()
.includes(key)

||

(x["Alamat"] || "")
.toLowerCase()
.includes(key)

||

(x["Blok"] || "")
.toLowerCase()
.includes(key)

);

filteredData = hasil;
render(filteredData);
}
</script>

</body>
</html>
