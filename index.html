<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tirto Langgeng</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--primary:#0060B1;
--green:#27ae60;
--red:#e74c3c;
--orange:#e67e22;
}

body{
font-family:Arial,sans-serif;
background:#f4f7f6;
margin:0;
padding:10px;
}

.header{
background:linear-gradient(135deg,#0060B1,#0099ff);
color:white;
padding:20px;
text-align:center;
border-radius:12px;
position:relative;
overflow:hidden;
}

.logo{
width:80px;
height:80px;
object-fit:contain;
background:white;
padding:8px;
border-radius:50%;
margin-bottom:10px;
box-shadow:0 0 15px rgba(255,255,255,.5);
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
border:none;
font-weight:bold;
cursor:pointer;
}

.btn{background:var(--primary);color:white;}
.green{background:var(--green);color:white;}
.red{background:var(--red);color:white;}
.orange{background:var(--orange);color:white;}

.hidden{display:none;}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    /* Hapus atau komentari min-width: 1600px; */
    min-width: 600px; 
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{background:#f8f9fa;}

.status-lunas{
color:green;
font-weight:bold;
}

.status-belum{
color:red;
font-weight:bold;
}

.wrap{
overflow-x:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login Sistem</h3>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>
</div>

<!-- HEADER -->
<div class="header">
<img src="image_916921.png" class="logo">
<h2 style="margin:0;">TIRTO LANGGENG</h2>
<p style="margin:5px 0 0 0;">BUMDes Tunas Bangsa Ngebruk</p>
</div>

<!-- ADMIN PANEL -->
<div class="card hidden" id="adminPanel">
<h3>🔓 Mode Admin</h3>

<input type="file" id="csvFile" accept=".csv">

<button class="btn" onclick="uploadCSV()">Upload CSV</button>
<button class="orange" onclick="downloadTemplate()">Template CSV</button>
<button class="orange" onclick="downloadCSV()">Download CSV</button>
<button class="red" onclick="hapusCSV()">Delete CSV</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- KOLEKTOR PANEL -->
<div class="card hidden" id="kolektorPanel">
<h3>💰 Mode Kolektor</h3>

<select id="filterKolektor" onchange="pilihKolektor()">
<option value="">-- Pilih Nama Kolektor --</option>
</select>

<button class="green" onclick="simpanPerubahan()">💾 Simpan Perubahan</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- SEARCH -->
<div class="card">
<input type="text" id="cari" placeholder="Cari pelanggan..." onkeyup="cariData()">
</div>

<!-- TABLE -->
<div class="card wrap">
<table>
<thead id="headTabel">
    </thead>

<tr>
<th>No</th>
<th>Konsumen</th>
<th>Alamat</th>
<th>Blok</th>
<th>Tipe</th>
<th>Kolektor</th>
<th>Meter Awal</th>
<th>Meter Akhir</th>
<th>Input Meter</th>
<th>Pemakaian</th>
<th>Tagihan</th>
<th>Status</th>
<th>Bayar</th>
<th>Sisa</th>
</tr>
</thead>

<tbody id="bodyTabel">
<tr>
<td colspan="12" style="text-align:center;padding:20px;">
Belum ada data
</td>
</tr>
</tbody>
</table>
</div>

<script>
const SUPABASE_URL = "https://ugezkavpzvcbwxmqgbrx.supabase.co";
const SUPABASE_KEY = "sb_publishable_2_2AqhV53QcVf8CQtuQJ9A_9Ll2JNir";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let role = "";
let globalData = [];
let filteredData = [];

// LOGIN
function login(){
alert("Login ditekan"); // TEST
let user = username.value.trim();
let pass = password.value.trim();

if(user==="Admin" && pass==="1234"){
role="admin";
localStorage.setItem("role","admin");
masuk();

}
else if(user==="kolektor" && pass==="1234"){
role="kolektor";
localStorage.setItem("role","kolektor");
masuk();

}
else{
alert("Username / Password salah!");
}
}

function masuk(){

loginBox.style.display="none";

if(role==="admin"){
adminPanel.style.display="block";
}

if(role==="kolektor"){
kolektorPanel.style.display="block";
}

loadData();
}

function logout(){
localStorage.removeItem("role");
location.reload();
}

// SAAT BUKA
window.onload=function(){


let r = localStorage.getItem("role");

if(r){
role=r;
masuk();
}else{
loadData();
}
}

// UPLOAD CEPAT
function uploadCSV(){

let file = csvFile.files[0];

if(!file){
alert("Pilih file CSV");
return;
}

Papa.parse(file,{
header:true,
skipEmptyLines:true,
worker:true,
fastMode:true,

complete:function(res){

globalData = res.data;
filteredData = [...globalData];

localStorage.setItem(
"tirtoData",
JSON.stringify(globalData)
);

isiKolektor();
render(filteredData);

alert("Upload berhasil : "+globalData.length+" data");
}
});
}

// LOAD DATA
async function loadData(){

let { data, error } = await supabase
.from("tirto_data")
.select("*");

if(error){
alert("Gagal ambil data");
console.log(error);
return;
}

globalData = data.map(x => ({
"No": x.no,
"Konsumen": x.konsumen,
"Alamat": x.alamat,
"Blok": x.blok,
"Tipe": x.tipe,
"Kolektor": x.kolektor,
"Awal Meter": x.meter_awal,
"Meter Sekarang": x.meter_akhir,
"Input Meter": x.input_meter,
"Pemakaian": x.pemakaian,
"Tagihan": x.tagihan,
"Status": x.status,
"Bayar": x.bayar,
"Sisa": x.sisa
}));

filteredData = [...globalData];

isiKolektor();
render(filteredData);
}
// FILTER KOLEKTOR
function isiKolektor(){

let list = [...new Set(globalData.map(x=>x["Kolektor"]||""))];

filterKolektor.innerHTML =
'<option value="">-- Pilih Nama Kolektor --</option>';

list.forEach(nama=>{
if(nama!=""){
filterKolektor.innerHTML +=
`<option value="${nama}">${nama}</option>`;
}
});
}

function pilihKolektor(){

let nama = filterKolektor.value;

if(nama===""){
filteredData = globalData;
}else{
filteredData =
globalData.filter(x=>x["Kolektor"]===nama);
}

render(filteredData);
}

// RENDER CEPAT
// RENDER DATA
function render(data) {
    const headTabel = document.getElementById("headTabel");
    const bodyTabel = document.getElementById("bodyTabel");

    if (data.length === 0) {
        bodyTabel.innerHTML = `<tr><td colspan="15" style="text-align:center;">Belum ada data</td></tr>`;
        return;
    }

    // 1. ATUR HEADER BERDASARKAN ROLE
    let headerHtml = "";
    if (role === "admin" || role === "kolektor") {
        headerHtml = `
            <tr>
                <th>No</th><th>Konsumen</th><th>Alamat</th><th>Blok</th><th>Kolektor</th>
                <th>Meter Awal</th><th>Meter Akhir (Input)</th><th>Pemakaian</th><th>Tagihan</th>
                <th>Status</th><th>Bayar</th><th>Sisa</th>
            </tr>`;
    } else {
        headerHtml = `
            <tr>
                <th>No</th><th>Konsumen</th><th>Alamat</th><th>Blok</th>
                <th>Kolektor</th><th>Pemakaian</th><th>Tagihan</th><th>Status</th>
            </tr>`;
    }
    headTabel.innerHTML = headerHtml;

    // 2. ATUR ISI TABEL
    let html = "";
    data.forEach((row, i) => {
        let lama = Number(row["Awal Meter"] || 0);
        let sekarang = Number(row["Meter Sekarang"] || lama);
        let pakai = sekarang - lama;
        if (pakai < 0) pakai = 0;

        // TARIF BERDASARKAN TIPE
        let tipe = (row["Tipe"] || "").toLowerCase();
        let tarif = 0;
        if (tipe.includes("rumah")) tarif = 500;
        else if (tipe.includes("niaga")) tarif = 800;
        else if (tipe.includes("sosial")) tarif = 0;

        let tagihan = pakai * tarif;
        let bayar = Number(row["Bayar"] || 0);
        let sisa = tagihan - bayar;
        let status = sisa <= 0 ? "Lunas" : "Belum Lunas";
        let klsStatus = sisa <= 0 ? "status-lunas" : "status-belum";

        if (role === "admin" || role === "kolektor") {
            html += `
                <tr>
                    <td>${row["No"] || i + 1}</td>
                    <td>${row["Konsumen"] || ""}</td>
                    <td>${row["Alamat"] || ""}</td>
                    <td>${row["Blok"] || ""}</td>
                    <td>${row["Kolektor"] || ""}</td>
                    <td>${lama}</td>
                    <td>
                        <input type="number" value="${sekarang}" 
                        onchange="ubahMeter('${row["No"]}', this.value)" 
                        style="width:80px; padding:4px;">
                    </td>
                    <td>${pakai} m³</td>
                    <td>Rp ${tagihan.toLocaleString()}</td>
                    <td class="${klsStatus}">${status}</td>
                    <td><input type="number" value="${bayar}" 
                        onchange="ubahBayar('${row["No"]}', this.value)" 
                        style="width:80px; padding:4px;"></td>
                    <td>Rp ${sisa.toLocaleString()}</td>
                </tr>`;
        } else {
            html += `
                <tr>
                    <td>${row["No"] || i + 1}</td>
                    <td>${row["Konsumen"] || ""}</td>
                    <td>${row["Alamat"] || ""}</td>
                    <td>${row["Blok"] || ""}</td>
                    <td>${row["Kolektor"] || ""}</td>
                    <td>${pakai} m³</td>
                    <td>Rp ${tagihan.toLocaleString()}</td>
                    <td class="${klsStatus}">${status}</td>
                </tr>`;
        }
    });

    bodyTabel.innerHTML = html;
}

// FUNGSI PEMBANTU UNTUK UPDATE DATA DI TABEL
function ubahMeter(no, nilai) {
    let index = globalData.findIndex(x => x["No"] == no);
    if (index !== -1) {
        globalData[index]["Meter Sekarang"] = Number(nilai);
        render(filteredData);
    }
}

function ubahBayar(no, nilai) {
    let index = globalData.findIndex(x => x["No"] == no);
    if (index !== -1) {
        globalData[index]["Bayar"] = Number(nilai);
        render(filteredData);
    }
}

// 🔥 TAMBAHAN TARIF
let tipe = (row["Tipe"] || "").toLowerCase();

let tarif = 0;

if (tipe === "rumah tangga") {
    tarif = 500;
} 
else if (tipe === "niaga") {
    tarif = 800;
} 
else if (tipe === "sosial") {
    tarif = 0;
}

// 🔥 HITUNG TAGIHAN (HANYA SEKALI)
let tagihan = pakai * tarif;

let bayar = Number(row["Bayar"] || 0);
let sisa = tagihan - bayar;
let status = sisa <= 0 ? "Sudah Bayar" : "Belum Bayar";
let klsStatus = sisa <= 0 ? "status-lunas" : "status-belum";
}
// hitung otomatis tagihan

        let bayar = Number(row["Bayar"] || 0);
        let sisa = tagihan - bayar;
        let status = sisa <= 0 ? "Sudah Bayar" : "Belum Bayar";
        let klsStatus = sisa <= 0 ? "status-lunas" : "status-belum";

        if (role === "admin" || role === "kolektor") {
            // Tampilan Lengkap untuk Admin/Kolektor
            html += `
                <tr>
                    <td>${row["No"] || i + 1}</td>
                    <td>${row["Konsumen"] || ""}</td>
                    <td>${row["Alamat"] || ""}</td>
                    <td>${row["Blok"] || ""}</td>
                    <td>${row["Kolektor"] || ""}</td>
                    <td>${lama}</td>
                    <td>${sekarang}</td>
                    <td>${pakai}</td>
                    <td>${tagihan.toLocaleString()}</td>
                    <td class="${klsStatus}">${status}</td>
                    <td>${bayar.toLocaleString()}</td>
                    <td>${sisa.toLocaleString()}</td>
                </tr>`;
        } else {
            // Tampilan Terbatas untuk Publik
            html += `
                <tr>
                    <td>${row["No"] || i + 1}</td>
                    <td>${row["Konsumen"] || ""}</td>
                    <td>${row["Alamat"] || ""}</td>
                    <td>${row["Blok"] || ""}</td>
                    <td>${row["Kolektor"] || ""}</td>
                    <td>${pakai}</td>
                    <td>${tagihan.toLocaleString()}</td>
                    <td class="${klsStatus}">${status}</td>
                </tr>`;
        }
    });

    bodyTabel.innerHTML = html;
}


// UBAH DATA
function ubah(no,kolom,nilai){

let index =
globalData.findIndex(x=>x["No"]==no);

if(index!=-1){
globalData[index][kolom]=nilai;
}
}

// SIMPAN
function simpanPerubahan(){

localStorage.setItem(
"tirtoData",
JSON.stringify(globalData)
);

render(filteredData);

alert("Perubahan berhasil disimpan");
}

// SEARCH
function cariData(){

let key = cari.value.toLowerCase();

filteredData =
globalData.filter(x=>

(x["Konsumen"]||"").toLowerCase().includes(key) ||
(x["Alamat"]||"").toLowerCase().includes(key) ||
(x["Blok"]||"").toLowerCase().includes(key) ||
(x["Kolektor"]||"").toLowerCase().includes(key)

);

render(filteredData);
}

// DOWNLOAD CSV
function downloadCSV(){

if(globalData.length===0){
alert("Data kosong");
return;
}

let csv = Papa.unparse(globalData);

let blob = new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "Data_Tagihan.csv";
link.click();
}

// TEMPLATE CSV
function downloadTemplate(){

let csv =
`No,Konsumen,Alamat,Blok,Tipe,Kolektor,Awal Meter,Meter Sekarang,Input Meter,Pemakaian,Tagihan,Bayar,Sisa,Status
1,Budi,Ngebruk,A1,Rumah,Slamet,100,110,0,10,5000,0,5000,Belum Bayar
2,Siti,Ngebruk,A2,Rumah,Rudi,80,95,0,15,7500,7500,0,Sudah Bayar`;

let blob = new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "Template_Tirto_Lengkap.csv";
link.click();
}

// HAPUS
async function hapusCSV(){

if(!confirm("Yakin hapus semua data?")) return;

let { error } = await supabase
.from("tirto_data")
.delete()
.neq("no", 0);

if(error){
alert("Gagal hapus data");
console.log(error);
return;
}

globalData = [];
filteredData = [];
render([]);

alert("Data berhasil dihapus");
}


// LOAD DATA SAAT HALAMAN DIBUKA
window.addEventListener("DOMContentLoaded", () => {
    loadData();
});
</script>

</body>
</html>
