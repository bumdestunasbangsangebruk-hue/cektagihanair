<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tirto Langgeng Multi Login</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
:root{
--primary:#0060B1;
--green:#27ae60;
--red:#e74c3c;
--orange:#e67e22;
}

body{
font-family:Arial,sans-serif;
background:#f4f7f6;
margin:0;
padding:10px;
}

.header{
background:var(--primary);
color:white;
padding:20px;
text-align:center;
border-radius:12px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

input,button{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-top:5px;
width:100%;
box-sizing:border-box;
}

button{
border:none;
font-weight:bold;
cursor:pointer;
}

.btn{background:var(--primary);color:white;}
.green{background:var(--green);color:white;}
.red{background:var(--red);color:white;}
.orange{background:var(--orange);color:white;}

.hidden{display:none;}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
min-width:1200px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{background:#f8f9fa;}

.status-lunas{color:green;font-weight:bold;}
.status-belum{color:red;font-weight:bold;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login Sistem</h3>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

<p>
Admin = Admin / Tun@s123<br>
Kolektor = kolektor / bpsab123
</p>
</div>

<!-- HEADER -->
<div class="header">
<h2 style="margin:0">TIRTO LANGGENG</h2>
<p style="margin:0">BUMDes Tunas Bangsa Ngebruk</p>
</div>

<!-- ADMIN PANEL -->
<div class="card hidden" id="adminPanel">
<h3>🔓 Mode Admin</h3>

<input type="file" id="csvFile" accept=".csv">
<button class="btn" onclick="uploadCSV()">Upload CSV</button>
<button class="orange" onclick="downloadCSV()">Download CSV</button>
<button class="red" onclick="hapusCSV()">Delete CSV</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- KOLEKTOR PANEL -->
<div class="card hidden" id="kolektorPanel">
<h3>💰 Mode Kolektor</h3>
<button class="green" onclick="simpanPerubahan()">💾 Simpan Perubahan</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- SEARCH -->
<div class="card">
<input type="text" id="cari" placeholder="Cari pelanggan..." onkeyup="filterTabel()">
</div>

<!-- TABLE -->
<div class="card" style="overflow-x:auto;">
<table>
<thead>
<tr>
<th>No</th>
<th>Konsumen</th>
<th>Alamat</th>
<th>Blok</th>
<th>Awal</th>
<th>Akhir</th>
<th>Tagihan</th>
<th>Status</th>
<th>Bayar</th>
<th>Sisa</th>
</tr>
</thead>

<tbody id="bodyTabel">
<tr>
<td colspan="10" style="text-align:center;padding:20px;">
Belum ada data
</td>
</tr>
</tbody>
</table>
</div>

<script>
let role = "";
let globalData = [];

// ================= LOGIN =================
function login(){

let u = document.getElementById("username").value;
let p = document.getElementById("password").value;

if(u==="Admin" && p==="Tun@s123"){
role="admin";
localStorage.setItem("role","admin");
masuk();
}
else if(u==="kolektor" && p==="bpsab123"){
role="kolektor";
localStorage.setItem("role","kolektor");
masuk();
}
else{
alert("Login salah!");
}
}

function masuk(){

document.getElementById("loginBox").style.display="none";

if(role==="admin"){
document.getElementById("adminPanel").style.display="block";
}

if(role==="kolektor"){
document.getElementById("kolektorPanel").style.display="block";
}

loadData();
}

function logout(){
localStorage.removeItem("role");
location.reload();
}

// ================= AUTO LOGIN =================
window.onload=function(){

let r = localStorage.getItem("role");

if(r){
role=r;
masuk();
}else{
loadData();
}
}

// ================= CSV =================
function uploadCSV(){

let file = document.getElementById("csvFile").files[0];

if(!file){
alert("Pilih file CSV");
return;
}

Papa.parse(file,{
header:true,
skipEmptyLines:true,

complete:function(res){

globalData = res.data;

localStorage.setItem(
"tirtoData",
JSON.stringify(globalData)
);

render(globalData);

alert("Upload berhasil");
}
});
}

function loadData(){

let data = localStorage.getItem("tirtoData");

if(data){
globalData = JSON.parse(data);
render(globalData);
}
}

function downloadCSV(){

if(globalData.length===0){
alert("Data kosong");
return;
}

let csv = Papa.unparse(globalData);

let blob = new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

let link = document.createElement("a");

link.href = URL.createObjectURL(blob);
link.download = "Tagihan.csv";
link.click();
}

function hapusCSV(){

if(confirm("Hapus semua data?")){

globalData = [];
localStorage.removeItem("tirtoData");
render([]);
}
}

// ================= RENDER =================
function render(data){

let body = document.getElementById("bodyTabel");

if(data.length===0){
body.innerHTML=`
<tr>
<td colspan="10" style="text-align:center">
Belum ada data
</td>
</tr>`;
return;
}

body.innerHTML="";

data.forEach((row,i)=>{

let tagihan = Number(row["Tagihan"] || 0);
let bayar = Number(row["Bayar"] || 0);
let sisa = tagihan - bayar;

let status = sisa<=0 ? "Sudah Bayar" : "Belum Bayar";

if(role==="kolektor"){

body.innerHTML += `
<tr>
<td>${row["No"] || i+1}</td>
<td>${row["Konsumen"] || ""}</td>

<td>
<input value="${row["Alamat"] || ""}"
onchange="ubah(${i},'Alamat',this.value)">
</td>

<td>
<input value="${row["Blok"] || ""}"
onchange="ubah(${i},'Blok',this.value)">
</td>

<td>${row["Awal  Meter"] || ""}</td>
<td>${row["Akhir Meter"] || ""}</td>
<td>${tagihan}</td>

<td class="${status==='Sudah Bayar'?'status-lunas':'status-belum'}">
${status}
</td>

<td>
<input type="number"
value="${bayar}"
onchange="ubah(${i},'Bayar',this.value)">
</td>

<td>${sisa}</td>
</tr>
`;
}
else{

body.innerHTML += `
<tr>
<td>${row["No"] || i+1}</td>
<td>${row["Konsumen"] || ""}</td>
<td>${row["Alamat"] || ""}</td>
<td>${row["Blok"] || ""}</td>
<td>${row["Awal  Meter"] || ""}</td>
<td>${row["Akhir Meter"] || ""}</td>
<td>${tagihan}</td>
<td class="${status==='Sudah Bayar'?'status-lunas':'status-belum'}">
${status}
</td>
<td>${bayar}</td>
<td>${sisa}</td>
</tr>
`;
}

});
}

// ================= EDIT =================
function ubah(index,kolom,nilai){

globalData[index][kolom] = nilai;
}

// ================= SIMPAN =================
function simpanPerubahan(){

localStorage.setItem(
"tirtoData",
JSON.stringify(globalData)
);

render(globalData);

alert("Perubahan berhasil disimpan");
}

// ================= FILTER =================
function filterTabel(){

let key = document.getElementById("cari")
.value.toLowerCase();

let hasil = globalData.filter(x=>

(x["Konsumen"] || "")
.toLowerCase()
.includes(key)

||

(x["Alamat"] || "")
.toLowerCase()
.includes(key)
);

render(hasil);
}
</script>

</body>
</html>
