<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tirto Langgeng</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
:root{
--primary:#0060B1;
--green:#27ae60;
--red:#e74c3c;
--orange:#e67e22;
}

body{
font-family:Arial,sans-serif;
background:#f4f7f6;
margin:0;
padding:10px;
}

.header{
background:var(--primary);
color:white;
padding:20px;
text-align:center;
border-radius:12px;
}

.logo{
width:70px;
height:70px;
object-fit:contain;
background:white;
padding:6px;
border-radius:50%;
margin-bottom:10px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

.box{
padding:15px;
border-radius:10px;
color:white;
font-weight:bold;
text-align:center;
}

.blue{background:#3498db;}
.green{background:#27ae60;}
.red{background:#e74c3c;}
.orange{background:#e67e22;}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
border:none;
font-weight:bold;
cursor:pointer;
}

.btn{background:var(--primary);color:white;}
.hidden{display:none;}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
min-width:1800px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{background:#f8f9fa;}

.status-lunas{color:green;font-weight:bold;}
.status-belum{color:red;font-weight:bold;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login Sistem</h3>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>

<!-- HEADER -->
<div class="header">
<img src="image_916921.png" class="logo">
<h2 style="margin:0;">TIRTO LANGGENG</h2>
<p style="margin:5px 0 0 0;">BUMDes Tirto Langgeng Desa Ngebruk</p>
</div>

<!-- DASHBOARD -->
<div class="card hidden" id="laporanBox">
<h3>📊 Laporan Pembayaran</h3>
<div class="grid">
<div class="box blue">Total Data<br><span id="jmlData">0</span></div>
<div class="box green">Sudah Bayar<br><span id="jmlLunas">0</span></div>
<div class="box red">Belum Bayar<br><span id="jmlBelum">0</span></div>
<div class="box orange">Total Bayar<br><span id="totalBayar">Rp0</span></div>
</div>
</div>

<!-- ADMIN PANEL -->
<div class="card hidden" id="adminPanel">
<h3>🔓 Mode Admin</h3>

<input type="file" id="csvFile" accept=".csv">

<button class="btn" onclick="uploadCSV()">Upload CSV</button>
<button class="orange" onclick="downloadTemplate()">Template Upload</button>
<button class="orange" onclick="downloadCSV()">Download CSV</button>
<button class="red" onclick="hapusCSV()">Delete CSV</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- KOLEKTOR PANEL -->
<div class="card hidden" id="kolektorPanel">
<h3>💰 Mode Kolektor</h3>

<select id="filterKolektor" onchange="pilihKolektor()">
<option value="">-- Pilih Nama Kolektor --</option>
</select>

<button class="green" onclick="simpanPerubahan()">💾 Simpan Perubahan</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- SEARCH -->
<div class="card">
<input type="text" id="cari" placeholder="Cari pelanggan..." onkeyup="cariData()">
</div>

<!-- TABLE -->
<div class="card" style="overflow-x:auto;">
<table>
<thead>
<tr>
<th>No</th>
<th>Konsumen</th>
<th>Alamat</th>
<th>Blok</th>
<th>Kolektor</th>
<th>Tipe</th>
<th>Meter Lama</th>
<th>Meter Sekarang</th>
<th>Pemakaian</th>
<th>Tarif</th>
<th>Tagihan</th>
<th>Status</th>
<th>Bayar</th>
<th>Sisa</th>
</tr>
</thead>

<tbody id="bodyTabel">
<tr>
<td colspan="14" style="text-align:center;padding:20px;">Belum ada data</td>
</tr>
</tbody>
</table>
</div>

<script>
let role = "";
let globalData = [];
let filteredData = [];

// LOGIN
function login(){

let user = username.value.trim();
let pass = password.value.trim();

if(user==="Admin" && pass==="Tun@s123"){
role="admin";
localStorage.setItem("role","admin");
masuk();
}
else if(user==="kolektor" && pass==="bpsab123"){
role="kolektor";
localStorage.setItem("role","kolektor");
masuk();
}
else{
alert("Username / Password salah!");
}
}

function masuk(){

loginBox.style.display="none";
laporanBox.style.display="block";

if(role==="admin"){
adminPanel.style.display="block";
}

if(role==="kolektor"){
kolektorPanel.style.display="block";
}

loadData();
}

function logout(){
localStorage.removeItem("role");
location.reload();
}

// LOAD AWAL
window.onload=function(){

let r = localStorage.getItem("role");

if(r){
role=r;
masuk();
}else{
loadData();
}
}

// UPLOAD SUPER CEPAT
function uploadCSV(){

let file = csvFile.files[0];

if(!file){
alert("Pilih file CSV");
return;
}

Papa.parse(file,{
header:true,
skipEmptyLines:true,
worker:true,
fastMode:true,
dynamicTyping:true,

complete:function(res){

globalData = res.data;
filteredData = [...globalData];

localStorage.setItem(
"tirtoData",
JSON.stringify(globalData)
);

isiKolektor();
render(filteredData);

alert("Upload berhasil : "+globalData.length+" data");
}
});
}

// LOAD DATA
function loadData(){

let data = localStorage.getItem("tirtoData");

if(data){
globalData = JSON.parse(data);
filteredData = globalData;
isiKolektor();
render(filteredData);
}
}

// FILTER KOLEKTOR
function isiKolektor(){

let list = [...new Set(globalData.map(x=>x["Kolektor"]||""))];

filterKolektor.innerHTML =
'<option value="">-- Pilih Nama Kolektor --</option>';

list.forEach(nama=>{
if(nama!=""){
filterKolektor.innerHTML +=
`<option value="${nama}">${nama}</option>`;
}
});
}

function pilihKolektor(){

let nama = filterKolektor.value;

if(nama===""){
filteredData = globalData;
}else{
filteredData = globalData.filter(x=>x["Kolektor"]===nama);
}

render(filteredData);
}

// RENDER TERCEPAT
function render(data){

let body = bodyTabel;

if(data.length===0){
body.innerHTML =
`<tr><td colspan="14">Belum ada data</td></tr>`;
return;
}

let html = "";
let lunas=0;
let belum=0;
let totalBayar=0;

for(let i=0;i<data.length;i++){

let row = data[i];

let tipe = row["Tipe"] || "Rumah Tangga";

let lama = Number(row["Awal Meter"]||0);
let sekarang = Number(row["Meter Sekarang"]||lama);

let pakai = sekarang-lama;
if(pakai<0) pakai=0;

let tarif = tipe==="Niaga" ? 800 : 500;

let tagihan = pakai * tarif;

let bayar = Number(row["Bayar"]||0);

let sisa = tagihan - bayar;

let status = sisa<=0 ? "Sudah Bayar" : "Belum Bayar";

if(status==="Sudah Bayar") lunas++;
else belum++;

totalBayar += bayar;

html += `
<tr>
<td>${row["No"]||i+1}</td>
<td>${row["Konsumen"]||""}</td>
<td>${row["Alamat"]||""}</td>
<td>${row["Blok"]||""}</td>
<td>${row["Kolektor"]||""}</td>
<td>${tipe}</td>
<td>${lama}</td>
<td>${sekarang}</td>
<td>${pakai}</td>
<td>${tarif}</td>
<td>${tagihan}</td>
<td class="${status==='Sudah Bayar'?'status-lunas':'status-belum'}">${status}</td>
<td>${bayar}</td>
<td>${sisa}</td>
</tr>`;
}

body.innerHTML = html;

// laporan
jmlData.innerText = data.length;
jmlLunas.innerText = lunas;
jmlBelum.innerText = belum;
totalBayar.innerText = "Rp"+totalBayar.toLocaleString("id-ID");
}

// EDIT
function ubah(no,kolom,nilai){

let index =
globalData.findIndex(x=>x["No"]==no);

if(index!=-1){
globalData[index][kolom]=nilai;
}
}

// SIMPAN
function simpanPerubahan(){

localStorage.setItem(
"tirtoData",
JSON.stringify(globalData)
);

render(filteredData);

alert("Perubahan berhasil disimpan");
}

// SEARCH
function cariData(){

let key = cari.value.toLowerCase();

filteredData = globalData.filter(x=>

(x["Konsumen"]||"").toLowerCase().includes(key) ||
(x["Alamat"]||"").toLowerCase().includes(key) ||
(x["Blok"]||"").toLowerCase().includes(key) ||
(x["Kolektor"]||"").toLowerCase().includes(key) ||
(x["Tipe"]||"").toLowerCase().includes(key)

);

render(filteredData);
}

// DOWNLOAD CSV
function downloadCSV(){

if(globalData.length===0){
alert("Data kosong");
return;
}

let csv = Papa.unparse(globalData);

let blob = new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "Data_Tagihan.csv";
link.click();
}

// TEMPLATE CEPAT
function downloadTemplate(){

let csv =
`No,Konsumen,Alamat,Blok,Kolektor,Tipe,Awal Meter,Meter Sekarang,Bayar
1,Budi,Ngebruk,A1,Slamet,Rumah Tangga,100,120,10000
2,Siti,Ngebruk,A2,Rudi,Niaga,50,70,16000
3,Joko,Ngebruk,B1,Slamet,Rumah Tangga,90,100,5000`;

let blob = new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "Template_Tirto.csv";
link.click();
}

// HAPUS
function hapusCSV(){

if(confirm("Yakin hapus semua data?")){

globalData=[];
filteredData=[];

localStorage.removeItem("tirtoData");

render([]);
}
}
</script>

</body>
</html>
