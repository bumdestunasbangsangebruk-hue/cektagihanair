<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tirto Langgeng</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
:root{
--primary:#0060B1;
--green:#27ae60;
--red:#e74c3c;
--orange:#e67e22;
}

body{
font-family:Arial,sans-serif;
background:#f4f7f6;
margin:0;
padding:10px;
}

.header{
background:var(--primary);
color:white;
padding:20px;
text-align:center;
border-radius:12px;
}

.logo{
width:70px;
height:70px;
object-fit:contain;
background:white;
padding:6px;
border-radius:50%;
margin-bottom:10px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
border:none;
font-weight:bold;
cursor:pointer;
}

.btn{background:var(--primary);color:white;}
.green{background:var(--green);color:white;}
.red{background:var(--red);color:white;}
.orange{background:var(--orange);color:white;}

.hidden{display:none;}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
min-width:1900px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{background:#f8f9fa;}

.status-lunas{color:green;font-weight:bold;}
.status-belum{color:red;font-weight:bold;}

.wrap{overflow-x:auto;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login Sistem</h3>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>
</div>

<!-- HEADER -->
<div class="header">
<img src="image_916921.png" class="logo">
<h2>TIRTO LANGGENG</h2>
<p>BUMDes Tirto Langgeng Desa Ngebruk</p>
</div>

<!-- ADMIN -->
<div class="card hidden" id="adminPanel">
<h3>🔓 Admin Panel</h3>

<input type="file" id="csvFile" accept=".csv">

<button class="btn" onclick="uploadCSV()">Upload CSV</button>
<button class="orange" onclick="downloadTemplate()">Template CSV</button>
<button class="orange" onclick="downloadCSV()">Download CSV</button>
<button class="red" onclick="hapusCSV()">Hapus Data</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- KOLEKTOR -->
<div class="card hidden" id="kolektorPanel">
<h3>💰 Kolektor Panel</h3>

<select id="filterKolektor" onchange="filterByKolektor()">
<option value="">-- Pilih Kolektor --</option>
</select>

<button class="green" onclick="simpan()">💾 Simpan Perubahan</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- SEARCH -->
<div class="card">
<input type="text" id="cari" placeholder="Cari..." onkeyup="cari()">
</div>

<!-- TABLE -->
<div class="card wrap">
<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Alamat</th>
<th>Blok</th>
<th>Kolektor</th>
<th>Tipe</th>
<th>Meter Lama</th>
<th>Meter Sekarang</th>
<th>Pakai</th>
<th>Tarif</th>
<th>Tagihan</th>
<th>Status</th>
<th>Bayar</th>
<th>Sisa</th>
<th>Input Meter</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>
</div>

<script>

let data = [];
let role = "";

// LOGIN
function login(){

let u = username.value;
let p = password.value;

if(u==="Admin" && p==="Tun@s123"){
role="admin";
masuk();
}
else if(u==="kolektor" && p==="bpsab123"){
role="kolektor";
masuk();
}
else{
alert("Login salah");
}
}

function masuk(){
loginBox.style.display="none";
load();
}

// LOAD
function load(){
let d = localStorage.getItem("tirto");
if(d){
data = JSON.parse(d);
render(data);
}
}

// UPLOAD CEPAT
function uploadCSV(){

let file = csvFile.files[0];
if(!file)return alert("Pilih file");

Papa.parse(file,{
header:true,
skipEmptyLines:true,
worker:true,
fastMode:true,

complete:function(res){

data = res.data;
localStorage.setItem("tirto",JSON.stringify(data));
render(data);

alert("Upload sukses");
}
});
}

// FILTER KOLEKTOR
function filterByKolektor(){

let v = filterKolektor.value;

if(v==="") render(data);
else render(data.filter(x=>x.Kolektor===v));
}

// RENDER SUPER CEPAT
function render(rows){

let html="";

let lunas=0;
let belum=0;

rows.forEach((r,i)=>{

let lama = Number(r["Awal Meter"]||0);
let sekarang = Number(r["Meter Sekarang"]||lama);

let pakai = sekarang-lama;
if(pakai<0) pakai=0;

let tipe = r["Tipe"]||"Rumah Tangga";
let tarif = tipe==="Niaga"?800:500;

let tagihan = pakai*tarif;
let bayar = Number(r["Bayar"]||0);
let sisa = tagihan-bayar;

let status = sisa<=0?"Lunas":"Belum";

if(status==="Lunas") lunas++;
else belum++;

let inputMeter = role==="kolektor"
? `<input type="number" value="${sekarang}" onchange="edit(${i},'Meter Sekarang',this.value)">`
: sekarang;

let editMode = role==="kolektor"
? `
<input value="${r["Nama"]||""}" onchange="edit(${i},'Nama',this.value)">
<input value="${r["Alamat"]||""}" onchange="edit(${i},'Alamat',this.value)">
<input value="${r["Blok"]||""}" onchange="edit(${i},'Blok',this.value)">
<select onchange="edit(${i},'Tipe',this.value)">
<option ${tipe==="Rumah Tangga"?"selected":""}>Rumah Tangga</option>
<option ${tipe==="Niaga"?"selected":""}>Niaga</option>
</select>
<input type="number" value="${bayar}" onchange="edit(${i},'Bayar',this.value)">
`
: "";

html += `
<tr>
<td>${i+1}</td>
<td>${r["Nama"]||""}</td>
<td>${r["Alamat"]||""}</td>
<td>${r["Blok"]||""}</td>
<td>${r["Kolektor"]||""}</td>
<td>${tipe}</td>
<td>${lama}</td>
<td>${sekarang}</td>
<td>${pakai}</td>
<td>${tarif}</td>
<td>${tagihan}</td>
<td>${status}</td>
<td>${bayar}</td>
<td>${sisa}</td>
<td>${inputMeter}</td>
</tr>
`;
});

tabel.innerHTML = html;
}

// EDIT
function edit(i,key,val){
data[i][key]=val;
}

// SIMPAN
function simpan(){
localStorage.setItem("tirto",JSON.stringify(data));
alert("Tersimpan");
render(data);
}

// SEARCH
function cari(){

let k = cari.value.toLowerCase();

render(data.filter(x=>
(x.Nama||"").toLowerCase().includes(k)||
(x.Alamat||"").toLowerCase().includes(k)||
(x.Blok||"").toLowerCase().includes(k)
));
}

// TEMPLATE
function downloadTemplate(){

let csv =
`Nama,Alamat,Blok,Kolektor,Tipe,Awal Meter,Meter Sekarang,Bayar
Budi,Ngebruk,A1,Slamet,Rumah Tangga,100,120,10000
Siti,Ngebruk,A2,Rudi,Niaga,50,70,20000`;

let blob = new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="template.csv";
a.click();
}

// DOWNLOAD
function downloadCSV(){
let csv = Papa.unparse(data);
let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="data.csv";
a.click();
}

// HAPUS
function hapusCSV(){
if(confirm("Hapus semua data?")){
data=[];
localStorage.removeItem("tirto");
render([]);
}
}

</script>

</body>
</html>
