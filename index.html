<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Upload CSV dan Simpan ke Database</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    input[type="file"] {
      margin-bottom: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }
    th {
      background-color: #f4f4f4;
    }
  </style>
</head>
<body>

<h2>Upload CSV Data</h2>
<input type="file" id="upload" accept=".csv" />
<button id="uploadBtn">Upload dan Simpan Data</button>

<h3>Data Tabel</h3>
<table id="dataTable">
  <thead>
    <tr>
      <th>No</th>
      <th>Konsumen</th>
      <th>Alamat</th>
      <th>Blok</th>
      <th>Tipe</th>
      <th>Kolektor</th>
      <th>Meter Awal</th>
      <th>Meter Akhir</th>
      <th>Tagihan</th>
      <th>Bayar</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
  // Ganti dengan konfigurasi Supabase Anda
  const SUPABASE_URL = "https://ugezkavpzvcbwxmqgbrx.supabase.co";
const SUPABASE_KEY = "sb_publishable_2_2AqhV53QcVf8CQtuQJ9A_9Ll2JNir";
const TABLE_NAME = "tirto_data"; // Pastikan tabel ini ada di database


  let globalData = [];

  document.getElementById('uploadBtn').addEventListener('click', () => {
    const fileInput = document.getElementById('upload');
    const file = fileInput.files[0];
    if (!file) {
      alert("Silakan pilih file CSV terlebih dahulu.");
      return;
    }

    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: async function(res) {
        console.log("Hasil parsing CSV:", res.data);
        if (res.data.length === 0) {
          alert("CSV kosong atau format tidak sesuai");
          return;
        }
        globalData = res.data;
        await saveData();
        await loadData();
        renderTable();
        alert("Upload dan simpan data berhasil! Data yang diupload: " + globalData.length);
      }
    });
  });

  // Fungsi untuk menyimpan data ke database
  async function saveData() {
    for (const item of globalData) {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?on_conflict=No`, {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify(item)
        });
        const result = await res.json();
        console.log("Sukses simpan:", result);
      } catch (err) {
        console.error("Gagal simpan:", err);
      }
    }
  }

  // Fungsi untuk memuat data dari database
  async function loadData() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*`, {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`
        }
      });
      const data = await res.json();
      console.log("Data dari database:", data);
      globalData = data;
    } catch (err) {
      console.error("Gagal memuat data:", err);
    }
  }

  // Fungsi untuk menampilkan data di tabel
  function renderTable() {
    const tbody = document.querySelector('#dataTable tbody');
    tbody.innerHTML = "";
    globalData.forEach(item => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${item.No}</td>
        <td>${item.Konsumen}</td>
        <td>${item.Alamat}</td>
        <td>${item.Blok}</td>
        <td>${item.Tipe}</td>
        <td>${item.Kolektor}</td>
        <td>${item['Meter Awal']}</td>
        <td>${item['Meter Akhir']}</td>
        <td>${item.Tagihan}</td>
        <td>${item.Bayar}</td>
      `;
      tbody.appendChild(row);
    });
  }

  // Muat data awal dari database saat halaman dimuat
  window.onload = async () => {
    await loadData();
    renderTable();
  };
</script>

</body>
</html>
