<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Tirto Langgeng</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
:root{
--primary:#0060B1;
--green:#27ae60;
--red:#e74c3c;
--orange:#e67e22;
}

body{
font-family:Arial,sans-serif;
background:#f4f7f6;
margin:0;
padding:10px;
}

.header{
background:linear-gradient(135deg,#0060B1,#0099ff);
color:white;
padding:20px;
text-align:center;
border-radius:12px;
position:relative;
overflow:hidden;
}

.logo{
width:80px;
height:80px;
object-fit:contain;
background:white;
padding:8px;
border-radius:50%;
margin-bottom:10px;
box-shadow:0 0 15px rgba(255,255,255,.5);
}

/* Header tambahan untuk teks di bawah logo */
.header-text{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

/* Style tambahan untuk kolom baru */
th, td {
  padding:8px;
  border-bottom:1px solid #ddd;
  text-align:left;
}

/* Card dan form styling */
.card{
background:white;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
border:none;
font-weight:bold;
cursor:pointer;
}

.btn{background:var(--primary);color:white;}
.green{background:var(--green);color:white;}
.red{background:var(--red);color:white;}
.orange{background:var(--orange);color:white;}

.hidden{display:none;}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
min-width:1600px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{background:#f8f9fa;}

.status-lunas{
color:green;
font-weight:bold;
}

.status-belum{
color:red;font-weight:bold;
}

.wrap{
overflow-x:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login Sistem</h3>
<input type="text" id="username" placeholder="Username" />
<input type="password" id="password" placeholder="Password" />
<button class="btn" onclick="login()">Login</button>
</div>

<!-- HEADER -->
<div class="header" style="display:none;" id="headerSection">
<img src="image_916921.png" class="logo" />
<h2 style="margin:0;">TIRTO LANGGENG</h2>
<p style="margin:5px 0 0 0;">BUMDes Tunas Bangsa Ngebruk</p>
<!-- Tambahkan teks di bawah logo -->
<div class="header-text">Tirto Langgeng</div>
</div>

<!-- ADMIN PANEL -->
<div class="card hidden" id="adminPanel">
<h3>🔓 Mode Admin</h3>
<input type="file" id="csvFile" accept=".csv" />
<button class="btn" onclick="uploadCSV()">Upload CSV</button>
<button class="orange" onclick="downloadTemplate()">Template CSV</button>
<button class="orange" onclick="downloadCSV()">Download CSV</button>
<button class="red" onclick="hapusCSV()">Delete CSV</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- KOLEKTOR PANEL -->
<div class="card hidden" id="kolektorPanel">
<h3>💰 Mode Kolektor</h3>
<select id="filterKolektor" onchange="pilihKolektor()">
<option value="">-- Pilih Nama Kolektor --</option>
</select>
<button class="green" onclick="simpanPerubahan()">💾 Simpan Perubahan</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- SEARCH -->
<div class="card" style="display:flex; flex-direction:column; align-items:center;">
<!-- Logo di atas pencarian -->
<img src="image_916921.png" class="logo" style="margin-bottom:10px; width:100px; height:100px;" />
<input type="text" id="cari" placeholder="Cari pelanggan..." onkeyup="cariData()" />
</div>

<!-- TABLE -->
<div class="card wrap">
<table>
<thead>
<tr>
<th>No</th>
<th>Konsumen</th>
<th>Alamat</th>
<th>Blok</th>
<th>Tipe</th>
<th>Kolektor</th>
<th>Meter Awal</th>
<th>Meter Akhir</th>
<th>Meter Baru</th>
<th>Pemakaian</th>
<!-- Tambahkan kolom Iuran Makam -->
<th>Iuran Makam</th>
<th>Tagihan</th>
<th>Status</th>
<th>Bayar</th>
<th>Sisa</th>
</tr>
</thead>
<tbody id="bodyTabel">
<tr>
<td colspan="14" style="text-align:center;padding:20px;">Belum ada data</td>
</tr>
</tbody>
</table>
</div>

<script>
const SUPABASE_URL = "https://ugezkavpzvcbwxmqgbrx.supabase.co";
const SUPABASE_KEY = "sb_publishable_2_2AqhV53QcVf8CQtuQJ9A_9Ll2JNir";
const TABLE_NAME = "tirto_data"; // Pastikan tabel ini ada di database

let role = "";
let globalData = [];
let filteredData = [];

// Fungsi login sederhana
function login() {
  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();

  if (user === "Admin" && pass === "1234") {
    role = "admin";
    localStorage.setItem("role", "admin");
    masuk();
  } else if (user === "kolektor" && pass === "12345") {
    role = "kolektor";
    localStorage.setItem("role", "kolektor");
    masuk();
  } else {
    alert("Username / Password salah!");
  }
}

async function masuk() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("headerSection").style.display = "block";

  if (role === "admin") {
    document.getElementById("adminPanel").style.display = "block";
  } else if (role === "kolektor") {
    document.getElementById("kolektorPanel").style.display = "block";
  }

  // Muat data dari Supabase
  globalData = await fetchData();
  filteredData = [...globalData];

  isiKolektor();
  render(filteredData);
}

function logout() {
  localStorage.removeItem("role");
  location.reload();
}

// Saat halaman dimuat
window.onload = async () => {
  let r = localStorage.getItem("role");
  if (r) {
    role = r;
    await masuk();
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("headerSection").style.display = "none";
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("kolektorPanel").style.display = "none";
  }
};

// Ambil data dari Supabase
async function fetchData() {
  const response = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Accept": "application/json",
    },
  });
  if (!response.ok) {
    alert("Gagal mengambil data dari Supabase");
    return [];
  }
  const data = await response.json();
  return data;
}

// Simpan semua data ke Supabase (hapus dan insert ulang)
async function saveData() {
  // Hapus semua data lama
  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
    method: "DELETE",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
    },
  });
  // Masukkan data baru
  for (const item of globalData) {
    await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
      },
      body: JSON.stringify(item),
    });
  }
}

// Upload CSV
function uploadCSV() {
  let file = document.getElementById("csvFile").files[0];
  if (!file) {
    alert("Pilih file CSV");
    return;
  }

  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    worker: true,
    complete: async function (res) {
      globalData = res.data;
      filteredData = [...globalData];

      await saveData();

      isiKolektor();
      render(filteredData);

      alert("Upload berhasil : " + globalData.length + " data");
    },
  });
}

// Load data dari Supabase
async function loadData() {
  globalData = await fetchData();
  filteredData = globalData;
  isiKolektor();
  render(filteredData);
}

// Isi list Kolektor
function isiKolektor() {
  let list = [...new Set(globalData.map((x) => x["Kolektor"] || ""))];
  document.getElementById("filterKolektor").innerHTML =
    '<option value="">-- Pilih Nama Kolektor --</option>';
  list.forEach((nama) => {
    if (nama != "") {
      document.getElementById("filterKolektor").innerHTML += `<option value="${nama}">${nama}</option>`;
    }
  });
}

// Pilih Kolektor filter
function pilihKolektor() {
  let nama = document.getElementById("filterKolektor").value;
  if (nama === "") {
    filteredData = globalData;
  } else {
    filteredData = globalData.filter((x) => x["Kolektor"] === nama);
  }
  render(filteredData);
}

// Render data tabel
function render(data) {
  const role = localStorage.getItem("role");
  const isAdminOrKolektor = role === "admin" || role === "kolektor";

  if (data.length === 0) {
    document.getElementById("bodyTabel").innerHTML = `<tr><td colspan="14" style="text-align:center;padding:20px;">Belum ada data</td></tr>`;
    return;
  }

  let html = "";
  data.forEach((row, i) => {
    let lama = Number(row["Meter Awal"] || 0);
    let sekarang = Number(row["Meter Akhir"] || lama);
    let meter_baru = row["Meter Baru"] || "";
    let kolektor = row["Kolektor"] || "";
    let tipe = row["Tipe"] || "";
    let tarif = Number(row["Tarif"] || 0); // Pastikan ada field Tarif

    let pakai = sekarang - lama;
    if (pakai < 0) pakai = 0;

    let tagihan = Number(row["Tagihan"] || 0);
    let bayar = Number(row["Bayar"] || 0);
    let sisa = tagihan - bayar;

    // Hitung Iuran Makam
    let iuran_makam = Math.max(pakai * tarif + 1000, 7000);
    // Jika hasil di tagihan di bawah 6000, tetapkan menjadi 7000
    if (tagihan < 6000) {
      iuran_makam = 7000;
    }

    let status = sisa <= 0 ? "Sudah Bayar" : "Belum Bayar";

    // Render baris tabel
    if (role === "pengguna") {
      html += `
<tr>
<td>${row["No"] || i + 1}</td>
<td>${row["Konsumen"] || ""}</td>
<td>${row["Alamat"] || ""}</td>
<td>${row["Blok"] || ""}</td>
<td>${row["Tipe"] || ""}</td>
<td>${row["Kolektor"] || ""}</td>
<td>${lama}</td>
<td>${sekarang}</td>
<td></td>
<td>${pakai}</td>
<!-- Kolom Iuran Makam -->
<td>Rp. ${iuran_makam.toLocaleString()}</td>
<td>${tagihan}</td>
<td class="${status==='Sudah Bayar'?'status-lunas':'status-belum'}">${status}</td>
<td>${bayar}</td>
<td>${sisa}</td>
</tr>`;
    } else {
      // Admin & Kolektor
      html += `
<tr>
<td>${row["No"] || i + 1}</td>
<td contenteditable="${isAdminOrKolektor}" onblur="ubah(${row["No"]},'Konsumen',this.innerText)">${row["Konsumen"] || ""}</td>
<td contenteditable="${isAdminOrKolektor}" onblur="ubah(${row["No"]},'Alamat',this.innerText)">${row["Alamat"] || ""}</td>
<td contenteditable="${isAdminOrKolektor}" onblur="ubah(${row["No"]},'Blok',this.innerText)">${row["Blok"] || ""}</td>
<td>
  <select ${isAdminOrKolektor ? "" : "disabled"} onchange="ubah(${row["No"]},'Tipe',this.value)">
    <option value="Rumah Tangga" ${row["Tipe"]==="Rumah Tangga"?"selected":""}>Rumah Tangga</option>
    <option value="Niaga" ${row["Tipe"]==="Niaga"?"selected":""}>Niaga</option>
    <option value="Sosial" ${row["Tipe"]==="Sosial"?"selected":""}>Sosial</option>
  </select>
</td>
<td contenteditable="${isAdminOrKolektor}" onblur="ubah(${row["No"]},'Kolektor',this.innerText)">${row["Kolektor"] || ""}</td>
<td>${lama}</td>
<td>${sekarang}</td>
<td>
  <input type="number" min="0" value="${meter_baru}" ${isAdminOrKolektor ? "" : "disabled"} onchange="ubahMeterBaru(${row["No"]},this.value)">
</td>
<!-- Kolom Iuran Makam -->
<td>Rp. ${iuran_makam.toLocaleString()}</td>
<td>${pakai}</td>
<td>${tagihan}</td>
<td class="${status==='Sudah Bayar'?'status-lunas':'status-belum'}">${status}</td>
<td>${bayar}</td>
<td>${sisa}</td>
</tr>`;
    }
  });
  document.getElementById("bodyTabel").innerHTML = html;
}

// Ubah data
function ubah(no, kolom, nilai) {
  let index = globalData.findIndex((x) => x["No"] == no);
  if (index != -1) {
    globalData[index][kolom] = nilai;
  }
}

// Ubah Meter Baru
function ubahMeterBaru(no, nilai) {
  let index = globalData.findIndex((x) => x["No"] == no);
  if (index != -1) {
    globalData[index]["Meter Baru"] = nilai;
  }
}

// Simpan perubahan ke Supabase
async function simpanPerubahan() {
  await saveData();
  render(filteredData);
  alert("Perubahan berhasil disimpan");
}

// Cari
function cariData() {
  let key = document.getElementById("cari").value.toLowerCase();
  filteredData = globalData.filter(
    (x) =>
      (x["Konsumen"] || "").toLowerCase().includes(key) ||
      (x["Alamat"] || "").toLowerCase().includes(key) ||
      (x["Blok"] || "").toLowerCase().includes(key) ||
      (x["Kolektor"] || "").toLowerCase().includes(key) ||
      (x["Tipe"] || "").toLowerCase().includes(key)
  );
  render(filteredData);
}

// Download CSV
function downloadCSV() {
  if (globalData.length === 0) {
    alert("Data kosong");
    return;
  }
  let csv = Papa.unparse(globalData);
  let blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "Data_Tagihan.csv";
  link.click();
}

// Download template CSV
function downloadTemplate() {
  let csv = `No,Konsumen,Alamat,Blok,Tipe,Kolektor,Meter Awal,Meter Akhir,Tagihan,Bayar
1,Budi,Ngebruk,A1,Sosial,Slamet,100,110,5000,0
2,Siti,Ngebruk,A2,Niaga,Rudi,80,95,7500,7500`;
  let blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "Template_Tirto.csv";
  link.click();
}

// Hapus semua data
function hapusCSV() {
  if (confirm("Yakin hapus semua data?")) {
    globalData = [];
    filteredData = [];
    // Hapus dari Supabase
    fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
      method: "DELETE",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
      },
    }).then(() => {
      render([]);
    });
  }
}
</script>
</body>
</html>
