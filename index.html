<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TIRTO LANGGENG PRO MAX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
:root{
--primary:#0060B1;
--green:#27ae60;
--red:#e74c3c;
--orange:#e67e22;
}

body{
font-family:Arial,sans-serif;
background:#f4f7f6;
margin:0;
padding:10px;
}

.header{
background:var(--primary);
color:white;
padding:20px;
text-align:center;
border-radius:12px;
}

.logo{
width:75px;
height:75px;
object-fit:contain;
background:white;
padding:6px;
border-radius:50%;
margin-bottom:10px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.box{
padding:12px;
border-radius:10px;
color:white;
font-weight:bold;
text-align:center;
}

.blue{background:#3498db;}
.green{background:#27ae60;}
.red{background:#e74c3c;}
.orange{background:#e67e22;}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
border:none;
font-weight:bold;
cursor:pointer;
}

.btn{background:var(--primary);color:white;}
.hidden{display:none;}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
min-width:2000px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{background:#f8f9fa;}

.status-lunas{color:green;font-weight:bold;}
.status-belum{color:red;font-weight:bold;}

.wrap{overflow-x:auto;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login Sistem</h3>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>

<!-- HEADER -->
<div class="header">
<img src="image_916921.png" class="logo">
<h2>TIRTO LANGGENG</h2>
<p>BUMDes Tirto Langgeng Desa Ngebruk</p>
</div>

<!-- DASHBOARD -->
<div class="card hidden" id="dashBox">
<div class="grid">
<div class="box blue">Total<br><span id="dTotal">0</span></div>
<div class="box green">Lunas<br><span id="dLunas">0</span></div>
<div class="box red">Belum<br><span id="dBelum">0</span></div>
<div class="box orange">Masuk<br><span id="dMasuk">Rp0</span></div>
<div class="box blue">Tunggakan<br><span id="dTunggakan">Rp0</span></div>
</div>
</div>

<!-- ADMIN -->
<div class="card hidden" id="adminPanel">
<h3>🔓 Admin Panel</h3>
<input type="file" id="csvFile" accept=".csv">
<button class="btn" onclick="uploadCSV()">Upload CSV</button>
<button class="btn" onclick="downloadTemplate()">Template CSV</button>
<button class="btn" onclick="downloadCSV()">Export CSV</button>
<button class="btn" onclick="hapus()">Hapus Data</button>
<button class="btn" onclick="logout()">Logout</button>
</div>

<!-- KOLEKTOR -->
<div class="card hidden" id="kolektorPanel">
<h3>💰 Kolektor Panel</h3>
<select id="filter" onchange="filterKolektor()">
<option value="">-- Pilih Kolektor --</option>
</select>
<button class="btn" onclick="save()">Simpan</button>
<button class="btn" onclick="logout()">Logout</button>
</div>

<!-- SEARCH -->
<div class="card">
<input id="search" placeholder="Cari data..." onkeyup="cari()">
</div>

<!-- TABLE -->
<div class="card wrap">
<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Alamat</th>
<th>Blok</th>
<th>Kolektor</th>
<th>Tipe</th>
<th>Meter Lama</th>
<th>Meter Sekarang</th>
<th>Pakai</th>
<th>Tarif</th>
<th>Tagihan</th>
<th>Status</th>
<th>Bayar</th>
<th>Sisa</th>
<th>Input Meter</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>
</div>

<script>

let data=[];
let role="";

/* ================= LOGIN ================= */
function login(){

let u=username.value;
let p=password.value;

if(u==="Admin" && p==="Tun@s123"){
role="admin";
start();
}
else if(u==="kolektor" && p==="bpsab123"){
role="kolektor";
start();
}
else alert("Login salah");
}

function start(){
loginBox.style.display="none";
dashBox.style.display="block";
adminPanel.style.display="block";
load();
}

/* ================= LOAD ================= */
function load(){
let d=localStorage.getItem("tirto");
if(d){
data=JSON.parse(d);
render(data);
}
}

/* ================= UPLOAD CEPAT ================= */
function uploadCSV(){

let file=csvFile.files[0];
if(!file)return alert("Pilih file");

Papa.parse(file,{
header:true,
skipEmptyLines:true,
worker:true,
fastMode:true,

complete:function(res){
data=res.data;
saveLocal();
render(data);
alert("Upload sukses");
}
});
}

/* ================= SAVE ================= */
function saveLocal(){
localStorage.setItem("tirto",JSON.stringify(data));
}

/* ================= DASHBOARD ================= */
function dash(rows){

let t=rows.length,l=0,b=0,m=0,tg=0;

rows.forEach(r=>{

let a=+r["Awal Meter"]||0;
let s=+r["Meter Sekarang"]||a;
let p=s-a;if(p<0)p=0;

let tpf=r["Tipe"]==="Niaga"?800:500;
let tag=p*tpf;

let by=+r["Bayar"]||0;
let sisa=tag-by;

m+=by;tg+=sisa;
if(sisa<=0)l++;else b++;

});

dTotal.innerText=t;
dLunas.innerText=l;
dBelum.innerText=b;
dMasuk.innerText="Rp"+m.toLocaleString();
dTunggakan.innerText="Rp"+tg.toLocaleString();

}

/* ================= RENDER SUPER CEPAT ================= */
function render(rows){

let html="";

rows.forEach((r,i)=>{

let a=+r["Awal Meter"]||0;
let s=+r["Meter Sekarang"]||a;

let p=s-a;if(p<0)p=0;

let tipe=r["Tipe"]||"Rumah Tangga";
let tarif=tipe==="Niaga"?800:500;

let tag=p*tarif;
let by=+r["Bayar"]||0;
let sisa=tag-by;

let st=sisa<=0?"Lunas":"Belum";

html+=`
<tr>
<td>${i+1}</td>
<td>${r["Nama"]||""}</td>
<td>${r["Alamat"]||""}</td>
<td>${r["Blok"]||""}</td>
<td>${r["Kolektor"]||""}</td>
<td>${tipe}</td>
<td>${a}</td>
<td>${s}</td>
<td>${p}</td>
<td>${tarif}</td>
<td>${tag}</td>
<td class="${st=='Lunas'?'status-lunas':'status-belum'}">${st}</td>
<td>${by}</td>
<td>${sisa}</td>
<td>${role=="kolektor"
?`<input value="${s}" onchange="edit(${i},'Meter Sekarang',this.value)">`
:s}</td>
</tr>
`;

});

tabel.innerHTML=html;

dash(rows);

}

/* ================= EDIT ================= */
function edit(i,k,v){
data[i][k]=v;
saveLocal();
}

/* ================= SAVE ================= */
function save(){
saveLocal();
alert("Tersimpan");
render(data);
}

/* ================= SEARCH ================= */
function cari(){

let k=search.value.toLowerCase();

render(data.filter(x=>
(x.Nama||"").toLowerCase().includes(k)||
(x.Alamat||"").toLowerCase().includes(k)||
(x.Blok||"").toLowerCase().includes(k)||
(x.Kolektor||"").toLowerCase().includes(k)
));

}

/* ================= TEMPLATE ================= */
function downloadTemplate(){

let c=
`Nama,Alamat,Blok,Kolektor,Tipe,Awal Meter,Meter Sekarang,Bayar
Budi,Ngebruk,A1,Slamet,Rumah Tangga,100,120,10000`;

let b=new Blob([c],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="template.csv";
a.click();

}

/* ================= EXPORT ================= */
function downloadCSV(){
let c=Papa.unparse(data);
let b=new Blob([c],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="data.csv";
a.click();
}

/* ================= DELETE ================= */
function hapus(){
if(confirm("Hapus semua data?")){
data=[];
saveLocal();
render([]);
}
}

/* ================= INIT ================= */
window.onload=()=>{
let d=localStorage.getItem("tirto");
if(d){
data=JSON.parse(d);
render(data);
}
}

</script>

</body>
</html>
