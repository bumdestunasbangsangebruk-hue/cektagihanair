<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TIRTO LANGGENG</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
padding:15px;
color:#222;
}

.container{
max-width:1400px;
margin:auto;
}

.header{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
padding:25px;
border-radius:18px;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,.2);
margin-bottom:15px;
}

.header h1{
font-size:32px;
margin-bottom:5px;
}

.header p{
opacity:.95;
}

.card{
background:white;
border-radius:18px;
padding:18px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.stat{
padding:18px;
border-radius:15px;
color:white;
font-weight:bold;
}

.blue{background:#2563eb}
.green{background:#16a34a}
.red{background:#dc2626}
.orange{background:#ea580c}

input,select,button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-top:8px;
font-size:15px;
}

button{
border:none;
cursor:pointer;
font-weight:bold;
}

.btn{
background:#2563eb;
color:white;
}

.logout{
background:#dc2626;
color:white;
}

table{
width:100%;
border-collapse:collapse;
min-width:1400px;
font-size:14px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#eff6ff;
position:sticky;
top:0;
}

.status-lunas{color:#16a34a;font-weight:bold}
.status-belum{color:#dc2626;font-weight:bold}

.hidden{display:none}

.wrap{
overflow:auto;
max-height:70vh;
}
</style>
</head>

<body>

<div class="container">

<!-- GANTI HEADER LAMA DENGAN INI -->

<div class="header premium-header">

<div class="logo-box">
<img src="image_916921.png" class="logo-premium">
<div class="water-ring"></div>
</div>

<h1>TIRTO LANGGENG</h1>
<p>BUMDes Tunas Bangsa Desa Ngebruk</p>

<div class="wave"></div>

</div>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login Sistem</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div class="card hidden" id="panel">

<div class="grid">

<div class="stat blue">
Total Pelanggan
<h2 id="jmlPelanggan">0</h2>
</div>

<div class="stat green">
Sudah Bayar
<h2 id="jmlLunas">0</h2>
</div>

<div class="stat red">
Belum Bayar
<h2 id="jmlBelum">0</h2>
</div>

<div class="stat orange">
Total Pemasukan
<h2 id="totalMasuk">Rp0</h2>
</div>

</div>

<br>

<input type="file" id="csvFile" accept=".csv">
<button class="btn" onclick="uploadCSV()">📂 Upload CSV</button>
<button class="btn" onclick="downloadTemplate()">📥 Download Template</button>
<button class="btn" onclick="downloadCSV()">📤 Export CSV</button>
<button class="logout" onclick="logout()">Logout</button>

<input id="cari" placeholder="Cari pelanggan..." onkeyup="cariData()">

</div>

<!-- TABLE -->
<div class="card hidden" id="tableBox">
<div class="wrap">
<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Alamat</th>
<th>Tipe</th>
<th>Awal</th>
<th>Sekarang</th>
<th>Pakai</th>
<th>Tarif</th>
<th>Tagihan</th>
<th>Bayar</th>
<th>Sisa</th>
<th>Status</th>
</tr>
</thead>
<tbody id="bodyTabel"></tbody>
</table>
</div>
</div>

</div>

<script>

let data = [];
let role = "";

function login(){

let u = user.value.trim();
let p = pass.value.trim();

if(u==="Admin" && p==="123"){
role="admin";
masuk();
}
else if(u==="Kolektor" && p==="123"){
role="kolektor";
masuk();
}
else{
alert("Login salah");
}
}

function masuk(){
loginBox.classList.add("hidden");
panel.classList.remove("hidden");
tableBox.classList.remove("hidden");
loadData();
}

function logout(){
location.reload();
}

function uploadCSV(){

let file = csvFile.files[0];
if(!file)return alert("Pilih file");

Papa.parse(file,{
header:true,
skipEmptyLines:true,
worker:true,
fastMode:true,

complete:function(res){

data = res.data;
localStorage.setItem("tirtoPro",JSON.stringify(data));
render(data);

alert("Upload sukses : "+data.length+" data");

}
});
}

function loadData(){
let d = localStorage.getItem("tirtoPro");
if(d){
data = JSON.parse(d);
render(data);
}
}

function render(rows){

let html = "";

let lunas=0;
let belum=0;
let masuk=0;

rows.forEach((r,i)=>{

let awal = Number(r["Awal"]||0);
let sekarang = Number(r["Sekarang"]||0);
let pakai = sekarang-awal;
if(pakai<0)pakai=0;

let tarif = r["Tipe"]==="Niaga" ? 800 : 500;

let tagihan = pakai*tarif;

let bayar = Number(r["Bayar"]||0);

let sisa = tagihan-bayar;

let status = sisa<=0 ? "LUNAS":"BELUM";

if(status==="LUNAS")lunas++;
else belum++;

masuk += bayar;

html += `
<tr>
<td>${i+1}</td>
<td>${r["Nama"]||""}</td>
<td>${r["Alamat"]||""}</td>
<td>${r["Tipe"]||"Rumah Tangga"}</td>
<td>${awal}</td>
<td>${sekarang}</td>
<td>${pakai}</td>
<td>Rp${tarif}</td>
<td>Rp${tagihan}</td>
<td>Rp${bayar}</td>
<td>Rp${sisa}</td>
<td class="${status==='LUNAS'?'status-lunas':'status-belum'}">${status}</td>
</tr>
`;

});

bodyTabel.innerHTML = html;

jmlPelanggan.innerText = rows.length;
jmlLunas.innerText = lunas;
jmlBelum.innerText = belum;
totalMasuk.innerText = "Rp"+masuk.toLocaleString();
}

function cariData(){

let key = cari.value.toLowerCase();

let hasil = data.filter(x =>
(x["Nama"]||"").toLowerCase().includes(key) ||
(x["Alamat"]||"").toLowerCase().includes(key) ||
(x["Tipe"]||"").toLowerCase().includes(key)
);

render(hasil);
}

function downloadCSV(){

let csv = Papa.unparse(data);
let blob = new Blob([csv],{type:'text/csv'});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "tirto_langgeng.csv";
a.click();
}

function downloadTemplate(){

let csv =
`Nama,Alamat,Tipe,Awal,Sekarang,Bayar
Budi,Ngebruk,Rumah Tangga,100,120,10000
Siti,Ngebruk,Niaga,50,70,16000`;

let blob = new Blob([csv],{type:'text/csv'});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "template_tirto.csv";
a.click();
}

</script>

</body>
</html>
