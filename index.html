<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tirto Langgeng</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--primary:#0060B1;
--green:#27ae60;
--red:#e74c3c;
--orange:#e67e22;
}

body{
font-family:Arial,sans-serif;
background:#f4f7f6;
margin:0;
padding:10px;
}

.header{
background:linear-gradient(135deg,#0060B1,#0099ff);
color:white;
padding:20px;
text-align:center;
border-radius:12px;
position:relative;
overflow:hidden;
}

.logo{
width:80px;
height:80px;
object-fit:contain;
background:white;
padding:8px;
border-radius:50%;
margin-bottom:10px;
box-shadow:0 0 15px rgba(255,255,255,.5);
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
border:none;
font-weight:bold;
cursor:pointer;
}

.btn{background:var(--primary);color:white;}
.green{background:var(--green);color:white;}
.red{background:var(--red);color:white;}
.orange{background:var(--orange);color:white;}

.hidden{display:none;}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    /* Hapus atau komentari min-width: 1600px; */
    min-width: 600px; 
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{background:#f8f9fa;}

.status-lunas{
color:green;
font-weight:bold;
}

.status-belum{
color:red;
font-weight:bold;
}

.wrap{
overflow-x:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h3>🔐 Login Sistem</h3>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
</div>

<!-- HEADER -->
<div class="header">
<img src="image_916921.png" class="logo">
<h2 style="margin:0;">TIRTO LANGGENG</h2>
<p style="margin:5px 0 0 0;">BUMDes Tunas Bangsa Ngebruk</p>
</div>

<!-- ADMIN PANEL -->
<div class="card hidden" id="adminPanel">
<h3>🔓 Mode Admin</h3>

<input type="file" id="csvFile" accept=".csv">

<button class="btn" onclick="uploadCSV()">Upload CSV</button>
<button class="orange" onclick="downloadTemplate()">Template CSV</button>
<button class="orange" onclick="downloadCSV()">Download CSV</button>
<button class="red" onclick="hapusCSV()">Delete CSV</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- KOLEKTOR PANEL -->
<div class="card hidden" id="kolektorPanel">
<h3>💰 Mode Kolektor</h3>

<select id="filterKolektor" onchange="pilihKolektor()">
<option value="">-- Pilih Nama Kolektor --</option>
</select>

<button class="green" onclick="simpanPerubahan()">💾 Simpan Perubahan</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- SEARCH -->
<div class="card">
<input type="text" id="cari" placeholder="Cari pelanggan..." onkeyup="cariData()">
</div>

<!-- TABLE -->
<div class="card wrap">
    <table>
        <thead id="headTabel"></thead>
        
        <tbody id="bodyTabel">
            <tr>
                <td colspan="12" style="text-align:center;padding:20px;">
                    Memuat data...
                </td>
            </tr>
        </tbody>
    </table>
</div>

<tr>
<th>No</th>
<th>Konsumen</th>
<th>Alamat</th>
<th>Blok</th>
<th>Tipe</th>
<th>Kolektor</th>
<th>Meter Awal</th>
<th>Meter Akhir</th>
<th>Input Meter</th>
<th>Pemakaian</th>
<th>Tagihan</th>
<th>Status</th>
<th>Bayar</th>
<th>Sisa</th>
</tr>
</thead>

<tbody id="bodyTabel">
<tr>
<td colspan="12" style="text-align:center;padding:20px;">
Belum ada data
</td>
</tr>
</tbody>
</table>
</div>

<script>
const SUPABASE_URL = "https://ugezkavpzvcbwxmqgbrx.supabase.co";
const SUPABASE_KEY = "sb_publishable_2_2AqhV53QcVf8CQtuQJ9A_9Ll2JNir";

let supabase;
let role = "";
let globalData = [];

// Inisialisasi Supabase
try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch (e) {
    console.error("Library Supabase belum siap.");
}

function login() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    if (user === "Admin" && pass === "1234") {
        role = "admin";
        localStorage.setItem("role", "admin");
        masuk();
    } else if (user === "kolektor" && pass === "1234") {
        role = "kolektor";
        localStorage.setItem("role", "kolektor");
        masuk();
    } else {
        alert("Username/Password Salah!");
    }
}

function masuk() {
    document.getElementById("loginBox").style.display = "none";
    
    // Tampilkan panel yang sesuai
    const adminPanel = document.getElementById("adminPanel");
    const kolektorPanel = document.getElementById("kolektorPanel");
    
    if (role === "admin" && adminPanel) adminPanel.style.display = "block";
    if (role === "kolektor" && kolektorPanel) kolektorPanel.style.display = "block";

    // Beri jeda sedikit agar inisialisasi selesai sebelum tarik data
    setTimeout(loadData, 500);
}

function logout() {
    localStorage.removeItem("role");
    location.reload(); // Ini akan mengembalikan Mas ke layar login
}

async function loadData() {
    if (!supabase || !supabase.from) {
        console.log("Menunggu koneksi...");
        return;
    }

    try {
        const { data, error } = await supabase.from("tirto_data").select("*");
        if (error) throw error;

        globalData = data;
        render(globalData);
    } catch (err) {
        console.error("Gagal ambil data:", err.message);
    }
}

function render(data) {
    const head = document.getElementById("headTabel");
    const body = document.getElementById("bodyTabel");

    // Samakan jumlah kolom header dan body (6 kolom)
    head.innerHTML = `
        <tr>
            <th>No</th>
            <th>Konsumen</th>
            <th>Alamat</th>
            <th>Tipe</th>
            <th>Tagihan</th>
            <th>Status</th>
        </tr>`;

    let html = "";
    data.forEach((row, i) => {
        let lama = Number(row.meter_awal || 0);
        let baru = Number(row.meter_akhir || lama);
        let tarif = (row.tipe || "").toLowerCase().includes("niaga") ? 800 : 500;
        let total = (baru - lama) * tarif;
        
        let bayar = Number(row.bayar || 0);
        let sisa = total - bayar;
        let kls = sisa <= 0 ? "status-lunas" : "status-belum";

        html += `
            <tr>
                <td>${i + 1}</td>
                <td>${row.konsumen || '-'}</td>
                <td>${row.alamat || '-'}</td>
                <td>${row.tipe || '-'}</td>
                <td>Rp ${total.toLocaleString()}</td>
                <td class="${kls}">${sisa <= 0 ? 'Lunas' : 'Belum'}</td>
            </tr>`;
    });
    body.innerHTML = html;
}

window.onload = function() {
    const savedRole = localStorage.getItem("role");
    if (savedRole) {
        role = savedRole;
        masuk();
    } else {
        loadData();
    }
};
</script>

</body>
</html>
