<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Tirto Langgeng</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
/* STYLE SAMA */
body{font-family:Arial;background:#f4f7f6;padding:10px}
.card{background:white;padding:15px;border-radius:10px;margin-top:10px}
.hidden{display:none}
input,select,button{width:100%;padding:8px;margin-top:5px}
button{cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:6px;border-bottom:1px solid #ddd}
.status-lunas{color:green;font-weight:bold}
.status-belum{color:red;font-weight:bold}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div class="card hidden" id="adminPanel">
<h3>Admin</h3>
<input type="file" id="csvFile">
<button onclick="uploadCSV()">Upload CSV</button>
<button onclick="hapusSemua()">Hapus Semua Data</button>
<button onclick="logout()">Logout</button>
</div>

<!-- KOLEKTOR -->
<div class="card hidden" id="kolektorPanel">
<h3>Kolektor</h3>
<button onclick="simpan()">Simpan</button>
<button onclick="logout()">Logout</button>
</div>

<!-- TABLE -->
<div class="card">
<table>
<thead id="thead"></thead>
<tbody id="body"></tbody>
</table>
</div>

<script>
const SUPABASE_URL="https://YOUR_URL.supabase.co";
const SUPABASE_KEY="YOUR_KEY";
const db = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let role="";
let data=[];

// LOGIN
function login(){
let u=username.value;
let p=password.value;

if(u==="Admin" && p==="123"){
role="admin";
}
else if(u==="kolektor" && p==="123"){
role="kolektor";
}
else{
alert("salah");return;
}

loginBox.classList.add("hidden");

if(role==="admin") adminPanel.classList.remove("hidden");
if(role==="kolektor") kolektorPanel.classList.remove("hidden");

load();
}

function logout(){location.reload();}

// LOAD DATA
async function load(){
let {data:res}=await db.from("tirto_data").select("*");
data=res||[];
render();
}

// HAPUS SEMUA
async function hapusSemua(){
await db.from("tirto_data").delete().neq("id",0);
load();
}

// UPLOAD CSV (REPLACE)
async function uploadCSV(){

let file=csvFile.files[0];
if(!file)return;

Papa.parse(file,{
header:true,
complete: async function(res){

// hapus lama
await db.from("tirto_data").delete().neq("id",0);

// insert baru
let rows = res.data.map(x=>({
no:x.No,
konsumen:x.Konsumen,
alamat:x.Alamat,
blok:x.Blok,
tipe:Number(x.Tipe||1000),
kolektor:x.Kolektor,
meter_awal:Number(x["Meter Awal"]||0),
meter_akhir:Number(x["Meter Akhir"]||0),
bayar:Number(x.Bayar||0),
status:x.Status||"Belum Bayar"
}));

await db.from("tirto_data").insert(rows);

load();
alert("Upload berhasil");
}
});
}

// HITUNG
function hitung(r){
let pakai = r.meter_akhir - r.meter_awal;
if(pakai<0) pakai=0;

let tagihan = pakai * r.tipe;
let sisa = tagihan - r.bayar;

return {pakai,tagihan,sisa};
}

// RENDER
function render(){

let head="";
let rows="";

// HEADER SESUAI ROLE
if(role===""){
head=`<tr>
<th>No</th><th>Konsumen</th><th>Alamat</th>
<th>Blok</th><th>Tipe</th><th>Kolektor</th>
<th>Pemakaian</th><th>Tagihan</th><th>Status</th>
</tr>`;
}

else{
head=`<tr>
<th>No</th><th>Konsumen</th><th>Alamat</th>
<th>Blok</th><th>Tipe</th><th>Kolektor</th>
<th>Meter Awal</th><th>Meter Akhir</th>
<th>Pemakaian</th><th>Tagihan</th>
<th>Status</th><th>Bayar</th><th>Sisa</th>
</tr>`;
}

thead.innerHTML=head;

// DATA
data.forEach((r,i)=>{

let h=hitung(r);

if(role===""){
rows+=`
<tr>
<td>${r.no}</td>
<td>${r.konsumen}</td>
<td>${r.alamat}</td>
<td>${r.blok}</td>
<td>${r.tipe}</td>
<td>${r.kolektor}</td>
<td>${h.pakai}</td>
<td>${h.tagihan}</td>
<td class="${h.sisa<=0?'status-lunas':'status-belum'}">
${h.sisa<=0?'Lunas':'Belum'}
</td>
</tr>`;
}
else{

rows+=`
<tr>
<td>${r.no}</td>
<td contenteditable oninput="edit(${i},'konsumen',this.innerText)">${r.konsumen}</td>
<td contenteditable oninput="edit(${i},'alamat',this.innerText)">${r.alamat}</td>
<td contenteditable oninput="edit(${i},'blok',this.innerText)">${r.blok}</td>
<td contenteditable oninput="edit(${i},'tipe',this.innerText)">${r.tipe}</td>
<td>${r.kolektor}</td>
<td contenteditable oninput="edit(${i},'meter_awal',this.innerText)">${r.meter_awal}</td>
<td contenteditable oninput="edit(${i},'meter_akhir',this.innerText)">${r.meter_akhir}</td>
<td>${h.pakai}</td>
<td>${h.tagihan}</td>
<td contenteditable oninput="edit(${i},'status',this.innerText)">
${r.status}
</td>
<td contenteditable oninput="edit(${i},'bayar',this.innerText)">
${r.bayar}
</td>
<td>${h.sisa}</td>
</tr>`;
}

});

body.innerHTML=rows;
}

// EDIT
function edit(i,field,val){
data[i][field]=val;
}

// SIMPAN
async function simpan(){

for(let r of data){
await db.from("tirto_data")
.update(r)
.eq("id",r.id);
}

alert("Tersimpan");
load();
}

// AUTO LOAD
load();
</script>

</body>
</html>
