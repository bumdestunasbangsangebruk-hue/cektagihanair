<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tirto Langgeng</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
:root{
    --primary:#0060B1;
    --danger:#d63031;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f7f6;
    margin:0;
    padding:15px;
}

.header{
    background:var(--primary);
    color:white;
    text-align:center;
    padding:20px;
    border-radius:12px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btn{
    background:var(--primary);
    color:white;
}

.danger{
    background:var(--danger);
    color:white;
}

.hidden{
    display:none;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#f8f9fa;
}
</style>
</head>

<body>

<button id="loginBtn" class="btn" onclick="login()">🔐 Admin Login</button>

<div class="header">
<h2>TIRTO LANGGENG</h2>
<p>BUMDes Tunas Bangsa Ngebruk</p>
</div>

<!-- PANEL ADMIN -->
<div id="adminPanel" class="card hidden">
<h3>🔓 Mode Admin</h3>

<input type="file" id="csvFile" accept=".csv"><br><br>

<button class="btn" onclick="uploadCSV()">📤 Upload CSV</button>
<button class="danger" onclick="deleteCSV()">🗑 Delete CSV</button>
<button class="danger" onclick="logout()">🚪 Logout</button>

</div>

<!-- TABEL -->
<div class="card">
<table>
<thead>
<tr>
<th>No</th>
<th>Konsumen</th>
<th>Alamat</th>
<th>Tagihan</th>
</tr>
</thead>
<tbody id="bodyTabel">
<tr>
<td colspan="4" style="text-align:center;">Belum ada data</td>
</tr>
</tbody>
</table>
</div>

<script>
// =======================
// FIREBASE CONFIG
// =======================
const firebaseConfig = {
    apiKey: "ISI_APIKEY",
    authDomain: "tirtolanggeng-39678.firebaseapp.com",
    projectId: "tirtolanggeng-39678",
    storageBucket: "tirtolanggeng-39678.appspot.com",
    messagingSenderId: "391541384860",
    appId: "1:391541384860:web:b4939f28f5adfa81a2ef59"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// EMAIL ADMIN
const ADMIN_EMAIL = "sulton.stsj@gmail.com";

// DATA GLOBAL
let globalData = [];

// =======================
// LOGIN
// =======================
function login(){
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
    .catch(err => alert(err.message));
}

// =======================
// LOGOUT
// =======================
function logout(){
    auth.signOut();
}

// =======================
// CEK LOGIN
// =======================
auth.onAuthStateChanged(user => {

    const panel = document.getElementById("adminPanel");
    const btn = document.getElementById("loginBtn");

    if(user){

        if(user.email.toLowerCase() === ADMIN_EMAIL){
            panel.classList.remove("hidden");
            btn.classList.add("hidden");
        }else{
            alert("Bukan Admin!");
            auth.signOut();
        }

    }else{
        panel.classList.add("hidden");
        btn.classList.remove("hidden");
    }

});

// =======================
// UPLOAD CSV
// =======================
function uploadCSV(){

    const file = document.getElementById("csvFile").files[0];

    if(!file){
        alert("Pilih file CSV dulu");
        return;
    }

    Papa.parse(file,{
        header:true,
        skipEmptyLines:true,

        complete:function(result){

            globalData = result.data;

            localStorage.setItem(
                "tirto_csv",
                JSON.stringify(globalData)
            );

            renderTable();

            alert("CSV berhasil diupload");
        }
    });
}

// =======================
// DELETE CSV
// =======================
function deleteCSV(){

    if(confirm("Yakin hapus data?")){

        globalData = [];

        localStorage.removeItem("tirto_csv");

        renderTable();

        alert("Data berhasil dihapus");
    }
}

// =======================
// TAMPILKAN TABEL
// =======================
function renderTable(){

    const body = document.getElementById("bodyTabel");

    if(globalData.length === 0){
        body.innerHTML = `
        <tr>
        <td colspan="4" style="text-align:center;">
        Belum ada data
        </td>
        </tr>`;
        return;
    }

    body.innerHTML = "";

    globalData.forEach((row,index)=>{

        body.innerHTML += `
        <tr>
        <td>${row.No || index+1}</td>
        <td>${row.Konsumen || ""}</td>
        <td>${row.Alamat || ""}</td>
        <td>Rp ${Number(row.Tagihan || 0).toLocaleString("id-ID")}</td>
        </tr>
        `;
    });

}

// =======================
// LOAD DATA SAAT BUKA
// =======================
window.onload = function(){

    const data = localStorage.getItem("tirto_csv");

    if(data){
        globalData = JSON.parse(data);
    }

    renderTable();
}

</script>

</body>
</html>
