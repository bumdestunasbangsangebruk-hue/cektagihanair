<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tirto Langgeng</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
:root{
--primary:#0060B1;
--green:#27ae60;
--red:#e74c3c;
--orange:#e67e22;
}

body{
font-family:Arial,sans-serif;
background:#f4f7f6;
margin:0;
padding:10px;
}

.header{
background:linear-gradient(135deg,#0060B1,#0099ff);
color:white;
padding:20px;
text-align:center;
border-radius:12px;
position:relative;
overflow:hidden;
}

.logo{
width:80px;
height:80px;
object-fit:contain;
background:white;
padding:8px;
border-radius:50%;
margin-bottom:10px;
box-shadow:0 0 15px rgba(255,255,255,.5);
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
border:none;
font-weight:bold;
cursor:pointer;
}

.btn{background:var(--primary);color:white;}
.green{background:var(--green);color:white;}
.red{background:var(--red);color:white;}
.orange{background:var(--orange);color:white;}

.hidden{display:none;}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
min-width:1600px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{background:#f8f9fa;}

.status-lunas{
color:green;
font-weight:bold;
}

.status-belum{
color:red;
font-weight:bold;
}

.wrap{
overflow-x:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login Sistem</h3>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>
</div>

<!-- HEADER -->
<div class="header">
<img src="image_916921.png" class="logo">
<h2 style="margin:0;">TIRTO LANGGENG</h2>
<p style="margin:5px 0 0 0;">BUMDes Tunas Bangsa Ngebruk</p>
</div>

<!-- ADMIN PANEL -->
<div class="card hidden" id="adminPanel">
<h3>🔓 Mode Admin</h3>

<input type="file" id="csvFile" accept=".csv">

<button class="btn" onclick="uploadCSV()">Upload CSV</button>
<button class="orange" onclick="downloadTemplate()">Template CSV</button>
<button class="orange" onclick="downloadCSV()">Download CSV</button>
<button class="red" onclick="hapusCSV()">Delete CSV</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- KOLEKTOR PANEL -->
<div class="card hidden" id="kolektorPanel">
<h3>💰 Mode Kolektor</h3>

<select id="filterKolektor" onchange="pilihKolektor()">
<option value="">-- Pilih Nama Kolektor --</option>
</select>

<button class="green" onclick="simpanPerubahan()">💾 Simpan Perubahan</button>
<button class="red" onclick="logout()">Logout</button>
</div>

<!-- SEARCH -->
<div class="card">
<input type="text" id="cari" placeholder="Cari pelanggan..." onkeyup="cariData()">
</div>

<!-- TABLE -->
<div class="card wrap">
<table>
<thead>
<tr>
<th>No</th>
<th>Konsumen</th>
<th>Alamat</th>
<th>Blok</th>
<th>Tipe</th>
<th>Kolektor</th>
<th>Meter Awal</th>
<th>Meter Akhir</th>
<th>Input Meter</th>
<th>Pemakaian</th>
<th>Tagihan</th>
<th>Status</th>
<th>Bayar</th>
<th>Sisa</th>
</tr>
</thead>

<tbody id="bodyTabel">
<tr>
<td colspan="12" style="text-align:center;padding:20px;">
Belum ada data
</td>
</tr>
</tbody>
</table>
</div>

<script>
let role = "";
let globalData = [];
let filteredData = [];

// LOGIN
function login(){

let user = username.value.trim();
let pass = password.value.trim();

if(user==="Admin" && pass==="1234"){
role="admin";
localStorage.setItem("role","admin");
masuk();
}
else if(user==="kolektor" && pass==="1234"){
role="kolektor";
localStorage.setItem("role","kolektor");
masuk();
}
else{
alert("Username / Password salah!");
}
}

function masuk(){

loginBox.style.display="none";

if(role==="admin"){
adminPanel.style.display="block";
}

if(role==="kolektor"){
kolektorPanel.style.display="block";
}

loadData();
}

function logout(){
localStorage.removeItem("role");
location.reload();
}

// SAAT BUKA
window.onload=function(){

let r = localStorage.getItem("role");

if(r){
role=r;
masuk();
}else{
loadData();
}
}

// UPLOAD CEPAT
function uploadCSV(){

let file = csvFile.files[0];

if(!file){
alert("Pilih file CSV");
return;
}

Papa.parse(file,{
header:true,
skipEmptyLines:true,
worker:true,
fastMode:true,

complete:function(res){

globalData = res.data;
filteredData = [...globalData];

localStorage.setItem(
"tirtoData",
JSON.stringify(globalData)
);

isiKolektor();
render(filteredData);

alert("Upload berhasil : "+globalData.length+" data");
}
});
}

// LOAD DATA
function loadData(){

let data = localStorage.getItem("tirtoData");

if(data){

globalData = JSON.parse(data);
filteredData = globalData;

isiKolektor();
render(filteredData);
}
}

// FILTER KOLEKTOR
function isiKolektor(){

let list = [...new Set(globalData.map(x=>x["Kolektor"]||""))];

filterKolektor.innerHTML =
'<option value="">-- Pilih Nama Kolektor --</option>';

list.forEach(nama=>{
if(nama!=""){
filterKolektor.innerHTML +=
`<option value="${nama}">${nama}</option>`;
}
});
}

function pilihKolektor(){

let nama = filterKolektor.value;

if(nama===""){
filteredData = globalData;
}else{
filteredData =
globalData.filter(x=>x["Kolektor"]===nama);
}

render(filteredData);
}

// RENDER CEPAT
function render(data){

if(data.length===0){
bodyTabel.innerHTML =
`<tr><td colspan="12">Belum ada data</td></tr>`;
return;
}

let html="";

data.forEach((row,i)=>{

let lama = Number(row["Meter Awal"]||0);
let sekarang = Number(row["Meter Akhir"]||lama);

let pakai = sekarang-lama;
if(pakai<0)pakai=0;

let tagihan = Number(row["Tagihan"]||0);
let bayar = Number(row["Bayar"]||0);

let sisa = tagihan-bayar;

let status =
sisa<=0 ? "Sudah Bayar":"Belum Bayar";

// ==========================
// MODE PUBLIK (tanpa login)
// ==========================
if(role===""){

html += `
<tr>
<td>${row["No"]||i+1}</td>
<td>${row["Konsumen"]||""}</td>
<td>${row["Alamat"]||""}</td>
<td>${row["Blok"]||""}</td>
<td>${row["Tipe"]||""}</td>
<td>${pakai}</td>
<td>${tagihan}</td>
<td class="${status==='Sudah Bayar'?'status-lunas':'status-belum'}">${status}</td>
</tr>
`;

}

// ==========================
// MODE LOGIN (ADMIN / KOLEKTOR)
// ==========================
else{

html += `
<tr>
<td>${row["No"]||i+1}</td>
<td>${row["Konsumen"]||""}</td>
<td>${row["Alamat"]||""}</td>
<td>${row["Blok"]||""}</td>
<td>${row["Kolektor"]||""}</td>
<td>${lama}</td>
<td>${sekarang}</td>
<td>${pakai}</td>
<td>${tagihan}</td>
<td class="${status==='Sudah Bayar'?'status-lunas':'status-belum'}">${status}</td>
<td>${bayar}</td>
<td>${sisa}</td>
</tr>
`;

}

});

bodyTabel.innerHTML = html;
}
}

// UBAH DATA
function ubah(no,kolom,nilai){

let index =
globalData.findIndex(x=>x["No"]==no);

if(index!=-1){
globalData[index][kolom]=nilai;
}
}

// SIMPAN
function simpanPerubahan(){

localStorage.setItem(
"tirtoData",
JSON.stringify(globalData)
);

render(filteredData);

alert("Perubahan berhasil disimpan");
}

// SEARCH
function cariData(){

let key = cari.value.toLowerCase();

filteredData =
globalData.filter(x=>

(x["Konsumen"]||"").toLowerCase().includes(key) ||
(x["Alamat"]||"").toLowerCase().includes(key) ||
(x["Blok"]||"").toLowerCase().includes(key) ||
(x["Kolektor"]||"").toLowerCase().includes(key)

);

render(filteredData);
}

// DOWNLOAD CSV
function downloadCSV(){

if(globalData.length===0){
alert("Data kosong");
return;
}

let csv = Papa.unparse(globalData);

let blob = new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "Data_Tagihan.csv";
link.click();
}

// TEMPLATE CSV
function downloadTemplate(){

let csv =
`No,Konsumen,Alamat,Blok,Kolektor,Awal Meter,Meter Sekarang,Tagihan,Bayar
1,Budi,Ngebruk,A1,Slamet,100,110,5000,0
2,Siti,Ngebruk,A2,Rudi,80,95,7500,7500`;

let blob = new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "Template_Tirto.csv";
link.click();
}

// HAPUS
function hapusCSV(){

if(confirm("Yakin hapus semua data?")){

globalData=[];
filteredData=[];

localStorage.removeItem("tirtoData");

render([]);
}
}
</script>

</body>
</html>
